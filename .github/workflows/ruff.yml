# Ruff is a fast Python linter that catches real bugs beyond style issues.
# https://github.com/astral-sh/ruff
# https://pypi.org/project/ruff/ is MIT licensed, by Astral

name: Ruff
on:
  pull_request:
    branches:
      - "master"
      - 'branch-*'

permissions: {}

jobs:
  ruff:
    name: Run Ruff linter
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Ruff
        run: python -m pip install -U ruff
      - name: Run Ruff
        run: ruff check privacyidea
