#
# Builds the privacyIDEA Docker image and pushes it to the GitHub Container
# Registry (GHCR). The image is tagged with the branch name and the commit SHA.
#
# On pull requests, the image is built but NOT pushed (to avoid polluting the
# registry with every PR commit). The build itself still serves as a smoke test
# that the Dockerfile is valid and the build succeeds.
#
# Triggers:
#   - Push to any branch when relevant files change
#   - Pull requests targeting master / branch-*
#   - Manual dispatch

name: Container Build

on:
  push:
    paths:
      - 'Dockerfile'
      - 'deploy/docker/**'
      - 'privacyidea/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/container-build.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - 'master'
      - 'branch-*'
  workflow_dispatch:

# Needed to push images to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build container image
    runs-on: ubuntu-latest

    outputs:
      # Pass the image digest to downstream jobs so they can reference the
      # exact immutable image that was built, not just a mutable tag.
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch full history so setuptools-scm can determine the version
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        # Only log in when we actually intend to push (not on PRs)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tag with the branch name on push (e.g. ghcr.io/org/repo:master)
            type=ref,event=branch
            # Tag with the short commit SHA (e.g. ghcr.io/org/repo:sha-abc1234)
            type=sha,format=short
            # Tag as 'latest' only on pushes to master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Determine git version for setuptools-scm
        id: git-version
        run: |
          # git describe produces e.g. "v3.13dev0-17-g686b78382" or "v3.13.0-0-gabcdef"
          # We need a PEP 440 compliant version for setuptools-scm, e.g. "3.13.dev17+g686b78382"
          # Steps:
          #   1. Strip the leading "v"
          #   2. Strip any trailing pre-release tag on the base (e.g. "dev0")
          #   3. Convert "-<distance>-g<hash>" to ".dev<distance>+g<hash>"
          #   4. If distance is 0 (exact tag), just use the base version
          raw=$(git describe --tags --always --long)
          base=$(echo "$raw" | sed 's/^v//' | sed 's/-[0-9]*-g[0-9a-f]*$//' | sed 's/dev[0-9]*//')
          distance=$(echo "$raw" | sed 's/.*-\([0-9]*\)-g[0-9a-f]*$/\1/')
          hash=$(echo "$raw" | sed 's/.*-g\([0-9a-f]*\)$/\1/')
          if [ "$distance" = "0" ]; then
            version="${base}"
          else
            version="${base}.dev${distance}+g${hash}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Computed version: $version"

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          # Push only on direct pushes to a branch, not on PRs
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_VERSION=${{ steps.git-version.outputs.version }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

