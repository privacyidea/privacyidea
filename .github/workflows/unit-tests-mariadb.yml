#
# Runs the full unit test suite against MariaDB.
# On pull requests: only the oldest and newest supported Python versions are
# tested to keep feedback fast. The middle versions run nightly as a dependency
# health check — they are unlikely to catch Python-version bugs that min+max
# would miss, but they will surface broken installs or subtle stdlib regressions.
# Migration tests are excluded — they have their own dedicated workflow.

name: Unit Tests MariaDB

on:
  pull_request:
    paths:
      - 'privacyidea/**.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'tools/**'
      - '.github/workflows/unit-tests-mariadb.yml'
      - '.github/python-versions.env'
  schedule:
    # Nightly at 02:00 UTC — runs all Python versions as a dependency health check
    - cron: '0 2 * * *'

permissions:
  contents: read

# Cancel any in-progress run for the same PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  versions:
    name: Load Python versions
    runs-on: ubuntu-latest
    outputs:
      min: ${{ steps.load.outputs.min }}
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: load
        # On push/PR only test min and max; nightly runs all versions.
        env:
          IS_SCHEDULE: ${{ github.event_name == 'schedule' }}
        run: |
          set -a; source .github/python-versions.env; set +a
          echo "min=$MIN" >> "$GITHUB_OUTPUT"
          if [ "$IS_SCHEDULE" = "true" ]; then
            echo -n "matrix=" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$ALL" | jq -Rc 'split(" ")' >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[\"$MIN\",\"$MAX\"]" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: versions
    name: 'Python ${{ matrix.python-version }}'
    permissions:
      checks: write # allow the python tests to mark an action run as failed
    runs-on: ubuntu-latest
    strategy:
      # Do not cancel running matrix tests when one test fails
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.versions.outputs.matrix) }}

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: privacyidea_test
          MARIADB_USER: privacyidea
          MARIADB_PASSWORD: privacyidea
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          tests/requirements.txt

    - name: Install dependencies
      run: |
        pip install -r tests/requirements.txt
        pip install PyMySQL

    - name: Pre-create per-worker databases
      # pytest-xdist workers append a _gw<N> suffix to TEST_DATABASE_URL (see
      # tests/conftest.py). db.create_all() creates tables inside an existing
      # database — the databases themselves must be pre-created. Eight covers
      # typical GH runners (2-4 cores) with room to spare.
      run: |
        for i in $(seq 0 7); do
          mysql -h 127.0.0.1 -u root -proot -e \
            "CREATE DATABASE privacyidea_test_gw$i; \
             GRANT ALL ON privacyidea_test_gw$i.* TO 'privacyidea'@'%';"
        done

    - name: Test with pytest
      id: pytest_run
      env:
        TEST_DATABASE_URL: "mysql+pymysql://privacyidea:privacyidea@127.0.0.1:3306/privacyidea_test"
        PYTHONWARNINGS: "once::DeprecationWarning"
        PYTHON_VERSION: ${{ matrix.python-version }}
        MIN_PYTHON_VERSION: ${{ needs.versions.outputs.min }}
      run: |
        pip freeze
        # Collect coverage only on the lowest Python version to avoid redundant
        # reports and reduce overhead on all other matrix jobs.
        # --dist=loadfile keeps all tests in one file on one worker, preserving
        # the intra-file ordering the unittest-style suite currently relies on.
        if [ "$PYTHON_VERSION" = "$MIN_PYTHON_VERSION" ]; then
          python -b -m pytest -v -n auto --dist=loadfile --cov=privacyidea --cov-report=xml -m "not migration" tests/
        else
          python -b -m pytest -v -n auto --dist=loadfile -m "not migration" tests/
        fi

    - name: Codecov upload
      if: ${{ steps.pytest_run.outcome == 'success' && matrix.python-version == needs.versions.outputs.min }}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./coverage.xml
        flags: backend
        token: ${{ secrets.CODECOV_TOKEN }}
