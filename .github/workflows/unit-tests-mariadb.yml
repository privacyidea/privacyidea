#
# Runs the full unit test suite against a MariaDB database instead of the
# default SQLite. Migration tests are excluded here — they have their own
# dedicated workflow (migration-tests.yml).
#
# The tests run directly on the GitHub Actions runner (not inside a container)
# using the source code from the repository. MariaDB runs as a service sidecar.
# This matches the production database engine without the overhead of building
# a full application container for every test run.
#
# Triggers:
#   - Push to any branch when Python files change
#   - Pull requests targeting master / branch-*
#   - Nightly schedule

name: Unit Tests (MariaDB)

on:
  push:
    paths:
      - 'privacyidea/**.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/unit-tests-mariadb.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - 'master'
      - 'branch-*'
  schedule:
    # Nightly run at 03:21 UTC (offset from other nightly jobs)
    - cron: '21 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests against MariaDB (Python ${{ matrix.python-version }})
    permissions:
      checks: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: privacyidea_test
          MARIADB_USER: privacyidea
          MARIADB_PASSWORD: privacyidea
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            tests/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install PyMySQL

      - name: Run unit tests against MariaDB
        env:
          TEST_DATABASE_URL: "mysql+pymysql://privacyidea:privacyidea@127.0.0.1:3306/privacyidea_test"
          PYTHONWARNINGS: "once::DeprecationWarning"
        run: |
          python -b -m pytest -v --tb=short -m "not migration" tests/

