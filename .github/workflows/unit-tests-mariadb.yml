#
# Runs the full unit test suite against MariaDB for all supported Python
# versions. Migration tests are excluded — they have their own dedicated
# workflow (migration-tests.yml).

name: Unit Tests MariaDB

on:
  # run on each push to every branch of the repository but only on
  # pull requests to the 'master' and 'branch-*' branches
  push:
    paths:
      - 'privacyidea/**.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'tools/**'
      - '.github/workflows/unit-tests-mariadb.yml'
  pull_request:
    branches:
      - 'master'
      - 'branch-*'
    paths:
      - 'privacyidea/**.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'tools/**'
      - '.github/workflows/unit-tests-mariadb.yml'

permissions:
  contents: read

jobs:
  test:
    name: 'Python ${{ matrix.python-version }}'
    permissions:
      checks: write # allow the python tests to mark an action run as failed
    runs-on: ubuntu-latest
    strategy:
      # Do not cancel running matrix tests when one test fails
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: privacyidea_test
          MARIADB_USER: privacyidea
          MARIADB_PASSWORD: privacyidea
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          tests/requirements.txt

    - name: Install dependencies
      run: |
        pip install -r tests/requirements.txt
        pip install PyMySQL

    - name: Test with pytest
      id: pytest_run
      env:
        TEST_DATABASE_URL: "mysql+pymysql://privacyidea:privacyidea@127.0.0.1:3306/privacyidea_test"
        PYTHONWARNINGS: "once::DeprecationWarning"
      run: |
        pip freeze
        python -b -m pytest -v --cov=privacyidea --cov-report=xml -m "not migration" tests/

    - name: Codecov upload
      if: ${{ steps.pytest_run.outcome == 'success' }}
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
