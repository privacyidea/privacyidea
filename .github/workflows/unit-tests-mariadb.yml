#
# Runs the full unit test suite against MariaDB.
# On pull requests: only the oldest and newest supported Python versions are
# tested to keep feedback fast. The middle versions run nightly as a dependency
# health check — they are unlikely to catch Python-version bugs that min+max
# would miss, but they will surface broken installs or subtle stdlib regressions.
# Migration tests are excluded — they have their own dedicated workflow.

name: Unit Tests MariaDB

on:
  pull_request:
    paths:
      - 'privacyidea/**.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'tools/**'
      - '.github/workflows/unit-tests-mariadb.yml'
  schedule:
    # Nightly at 02:00 UTC — runs all Python versions as a dependency health check
    - cron: '0 2 * * *'

permissions:
  contents: read

# Cancel any in-progress run for the same PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 'Python ${{ matrix.python-version }}'
    permissions:
      checks: write # allow the python tests to mark an action run as failed
    runs-on: ubuntu-latest
    strategy:
      # Do not cancel running matrix tests when one test fails
      fail-fast: false
      matrix:
        # On push/PR only test min and max; nightly runs all versions.
        python-version: >-
          ${{
            (github.event_name == 'schedule')
            && fromJSON('["3.10","3.11","3.12","3.13","3.14"]')
            || fromJSON('["3.10","3.14"]')
          }}

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: privacyidea_test
          MARIADB_USER: privacyidea
          MARIADB_PASSWORD: privacyidea
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          tests/requirements.txt

    - name: Install dependencies
      run: |
        pip install -r tests/requirements.txt
        pip install PyMySQL

    - name: Test with pytest
      id: pytest_run
      env:
        TEST_DATABASE_URL: "mysql+pymysql://privacyidea:privacyidea@127.0.0.1:3306/privacyidea_test"
        PYTHONWARNINGS: "once::DeprecationWarning"
        PYTHON_VERSION: ${{ matrix.python-version }}
      run: |
        pip freeze
        # Collect coverage only on the lowest Python version to avoid redundant
        # reports and reduce overhead on all other matrix jobs.
        if [ "$PYTHON_VERSION" = "3.10" ]; then
          python -b -m pytest -v --cov=privacyidea --cov-report=xml -m "not migration" tests/
        else
          python -b -m pytest -v -m "not migration" tests/
        fi

    - name: Codecov upload
      if: ${{ steps.pytest_run.outcome == 'success' && matrix.python-version == '3.10' }}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
