#
# Builds the privacyidea Debian/Ubuntu package (.deb) and uploads it as a
# GitHub Actions artifact. No GPG signing, no upload to the release server.
#
# The build follows the same logic as ubuntu/Makefile but adapted for CI:
#   - Source comes from the checked-out repo instead of a git clone
#   - Angular frontend is built in-place
#   - The .orig.tar.gz is created from the local source (no scp from lancelot)
#   - dpkg-buildpackage runs without signing (-us -uc)
#
# Triggers:
#   - Manual dispatch (primary use case — build on demand for testing)
#   - Push to master / branch-* when packaging files change
#   - Pull requests targeting master / branch-* when packaging files change

name: Build Debian Package

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
      - 'branch-*'
    paths:
      - 'ubuntu/**'
      - 'deploy/**'
      - 'privacyidea/**.py'
      - 'privacyidea/static_new/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/deb-build.yml'
  pull_request:
    branches:
      - 'master'
      - 'branch-*'
    paths:
      - 'ubuntu/**'
      - 'deploy/**'
      - 'privacyidea/**.py'
      - 'privacyidea/static_new/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/deb-build.yml'

permissions:
  contents: read

jobs:
  build-deb:
    name: Build .deb on ${{ matrix.ubuntu-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu-version: ['jammy', 'noble']
        include:
          - ubuntu-version: jammy
            container: ubuntu:22.04
          - ubuntu-version: noble
            container: ubuntu:24.04

    container:
      image: ${{ matrix.include.container || format('ubuntu:{0}', matrix.ubuntu-version == 'jammy' && '22.04' || '24.04') }}
      env:
        DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git lsb-release ca-certificates curl

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            debhelper devscripts dh-virtualenv \
            python3 python3-virtualenv python3-pip \
            quilt build-essential libssl-dev libffi-dev \
            libmariadb-dev pkg-config \
            nodejs npm

      - name: Determine version
        id: version
        run: |
          # Produce a PEP-440 + Debian-compatible version from git describe.
          # git describe: v3.14.0-17-gabcdef  →  3.14.0.dev17+gabcdef
          # For an exact tag (distance=0): v3.14.0  →  3.14.0
          raw=$(git describe --tags --always --long 2>/dev/null || echo "0.0.0-0-g0000000")
          base=$(echo "$raw" | sed 's/^v//' | sed 's/-[0-9]*-g[0-9a-f]*$//' | sed 's/dev[0-9]*//')
          distance=$(echo "$raw" | sed 's/.*-\([0-9]*\)-g[0-9a-f]*$/\1/')
          hash=$(echo "$raw" | sed 's/.*-g\([0-9a-f]*\)$/\1/')
          if [ "$distance" = "0" ]; then
            version="${base}"
            deb_version="${base}-1"
          else
            version="${base}.dev${distance}+g${hash}"
            # Debian versions cannot contain '+', use '~' for pre-release ordering
            deb_version="${base}~dev${distance}-1"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "deb_version=${deb_version}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version}, deb version: ${deb_version}"

      - name: Build Angular frontend
        run: |
          cd privacyidea/static_new
          npm ci
          npm run build

      - name: Set up debian/ directory
        run: |
          SERIES=$(lsb_release -cs)
          mkdir -p debian
          cp -r ubuntu/debian_privacyidea/* debian/
          # Substitute the Ubuntu series in the changelog
          sed -e "s/trusty) trusty; urgency/${SERIES}) ${SERIES}; urgency/g" \
              ubuntu/debian_privacyidea/changelog > debian/changelog
          cp LICENSE debian/copyright
          cp -r deploy debian/

      - name: Create source tarball
        run: |
          # dpkg-buildpackage expects the .orig.tar.gz one directory up
          cd ..
          tar -zcf "privacyidea_${{ steps.version.outputs.deb_version }}.orig.tar.gz" \
            --exclude='./privacyidea/.git' \
            --exclude='./privacyidea/debian' \
            --exclude='./privacyidea/privacyidea/static_new/node_modules' \
            ./privacyidea

      - name: Build .deb package
        run: |
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_PRIVACYIDEA="${{ steps.version.outputs.version }}" \
          DH_VIRTUALENV_INSTALL_ROOT=/opt/ \
          DH_VERBOSE=1 \
          dpkg-buildpackage -us -uc -b

      - name: Collect built packages
        run: |
          mkdir -p dist
          mv ../*.deb ../*.changes dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: privacyidea-deb-${{ matrix.ubuntu-version }}
          path: dist/
          retention-days: 30

