# osv-scanner scans the Angular frontend's npm dependencies for known vulnerabilities
# using the OSV database (the same upstream that feeds GitHub's advisory DB).
# Results are uploaded to the Security tab as SARIF and do not block merging.
# Findings require manual triage — presence of a CVE does not imply reachability.
#
# Only the new Angular frontend at privacyidea/static_new/ is scanned. The legacy
# frontend is unmaintained and intentionally excluded.
#
# https://github.com/google/osv-scanner

name: osv-scanner-frontend

on:
  pull_request:
    branches:
      - "master"
      - "branch-*"
    paths:
      - "privacyidea/static_new/package-lock.json"
      - ".github/workflows/osv-scanner-frontend.yml"
  push:
    branches:
      - "master"
      - "branch-*"
    paths:
      - "privacyidea/static_new/package-lock.json"
      - ".github/workflows/osv-scanner-frontend.yml"
  schedule:
    # Nightly at 22:53 UTC — offset from backend scan (22:47) to avoid simultaneous load.
    - cron: '53 22 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  scan:
    name: Scan npm dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install osv-scanner
        env:
          OSV_SCANNER_VERSION: v2.3.5
          # SHA256 of osv-scanner_linux_amd64 for the version above, from the
          # release's osv-scanner_SHA256SUMS. Bump alongside OSV_SCANNER_VERSION.
          OSV_SCANNER_SHA256: bb30c580afe5e757d3e959f4afd08a4795ea505ef84c46962b9a738aa573b41b
        run: |
          set -euo pipefail
          curl -sSL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SCANNER_SHA256}  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run osv-scanner
        # Reporting-only: surface findings but don't block merges. Triage via the Security tab.
        continue-on-error: true
        run: |
          osv-scanner scan \
            --lockfile=privacyidea/static_new/package-lock.json \
            --format=sarif \
            --output-file=osv-results.sarif

      - name: Upload SARIF to the Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner-frontend
