name: GitLab Tag Master Branch

on:
  push:
    tags:
      - '*'

# No permissions needed for this action
permissions: {}

jobs:
  trigger-gitlab:
    name: Trigger internal GitLab pipeline
    runs-on: ubuntu-latest
    environment: gitlab

    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch branch-* heads
        # actions/checkout only fetches the triggering tag ref; the
        # `branch-*` remote-tracking refs need to be fetched explicitly
        # before `git branch -r --contains` can see them.
        run: git fetch --no-tags origin '+refs/heads/branch-*:refs/remotes/origin/branch-*'

      - name: Skip if tag is on a branch-* branch
        id: check
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          branches=$(git branch -r --contains "$GITHUB_SHA" | sed 's|^[ *]*origin/||' | grep -E '^branch-' || true)
          if [ -n "$branches" ]; then
            echo "Tag is on $branches; handled by gitlab-trigger-branch-tag, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: On Tag Trigger Pipeline
        if: steps.check.outputs.skip == 'false'
        env:
          GITLAB_TRIGGER_URL: https://lucan.netknights.it/api/v4/projects/3/trigger/pipeline
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          GITHUB_TAG: ${{ github.ref_name }}
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          curl -X POST "$GITLAB_TRIGGER_URL" \
            -F token="$GITLAB_TRIGGER_TOKEN" \
            -F ref=main \
            -F variables[GITHUB_TAG]="$GITHUB_TAG" \
            -F variables[GITHUB_REPO]="$GITHUB_REPO_URL"
