# This workflow will create python packages when the master branch is tagged

name: Python Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-webui:
    name: Build new WebUI artifacts
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    # Build the new WebUI using node.js
    - name: Set up Node.js for building the new WebUI
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        # Pin the major LTS line for release builds so the shipped artifact is
        # reproducible and a new Node LTS can't silently change build output.
        # Bump deliberately; patch/minor updates within the line are picked up.
        node-version: '22'
        package-manager-cache: false  # Disable cache for release builds

    - name: Install Node.js dependencies
      run: npm ci
      working-directory: ./privacyidea/static_new
    - name: Build the new WebUI
      run: npm run build -- --configuration production
      working-directory: ./privacyidea/static_new
    - name: Upload WebUI build artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: webui-artifact
        path: ./privacyidea/static_new/dist
        retention-days: 1

  build-dist:
    name: Build Python sdist and wheel
    permissions:
      contents: write  # for `gh release create` to create the GitHub release
    needs: build-webui
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Load Python versions
      id: pyversions
      run: |
        set -a; source .github/python-versions.env; set +a
        echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
    # Get the new WebUI from the build artifacts
    - name: Get new WebUI build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: webui-artifact
        path: ./privacyidea/static_new/dist
    - name: List downloaded artifact
      run: ls -R ./privacyidea/static_new/dist
    - run: mkdir -p dist
    - name: Set up Python ${{ steps.pyversions.outputs.release }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ steps.pyversions.outputs.release }}
    - name: Install build environment
      run: >-
        python -m pip install build --user
    - name: Build a binary wheel and a source tarball
      run: >-
        python -m build --sdist --wheel --outdir dist/
    - name: Upload packages to artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        path: dist/*
    - name: Create GitHub pre-release
      id: gh_pre_release
      if: contains(github.ref_name, 'dev')
      env:
        GH_TOKEN: ${{ github.token }}
      run: >-
        gh release create "$GITHUB_REF_NAME" dist/* --prerelease --notes ""
    - name: Create GitHub release draft
      if: steps.gh_pre_release.conclusion == 'skipped'
      env:
        GH_TOKEN: ${{ github.token }}
      run: >-
        gh release create "$GITHUB_REF_NAME" dist/* --draft --notes ""
