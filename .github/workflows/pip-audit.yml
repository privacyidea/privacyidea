# pip-audit scans Python dependencies for known vulnerabilities using the OSV database.
# Results are uploaded to the Security tab as SARIF and do not block merging.
# Findings require manual triage — presence of a CVE does not imply reachability.
#
# https://github.com/pypa/pip-audit

name: pip-audit

on:
  pull_request:
    branches:
      - "master"
      - "branch-*"
  schedule:
    # Do a nightly run at 22:47 UTC
    - cron: '47 22 * * *'

permissions: {}

jobs:
  pip-audit:
    name: Audit Python dependencies
    permissions:
      contents: read
      security-events: write # for github/codeql-action to upload SARIF results

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --requirement requirements.txt --progress-spinner off --format sarif --output pip-audit.sarif
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: pip-audit.sarif
          category: pip-audit
