name: Run WebUI tests
on:
  pull_request:
    paths:
      - 'privacyidea/static_new/**'

permissions:
  contents: read

defaults:
  run:
    working-directory: ./privacyidea/static_new

jobs:
  test-webui:
    name: Jest with Codecov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Node.js for testing the new WebUI
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*  # Use the latest LTS-release
          cache: npm
          cache-dependency-path: privacyidea/static_new/package-lock.json
      - name: Install Node.js dependencies
        run: npm ci
      - name: Run tests for the new WebUI
        id: jest_run
        run: npm run test:coverage
      - name: Codecov upload
        if: ${{ steps.jest_run.outcome == 'success' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./privacyidea/static_new/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
