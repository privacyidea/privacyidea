name: Build WebUI
on:
  pull_request:
    branches:
      - 'master'
      - 'branch-*'
    paths:
      - 'privacyidea/static_new/**'
  schedule:
    # Nightly at 01:00 UTC
    - cron: '0 1 * * *'

permissions:
  contents: read

defaults:
  run:
    working-directory: ./privacyidea/static_new

jobs:
  build-webui:
    name: npm run build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Node.js for building the new WebUI
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*  # Use the latest LTS-release
          cache: npm
          cache-dependency-path: privacyidea/static_new/package-lock.json
      - name: Install Node.js dependencies
        run: npm ci
      - name: Build the new WebUI
        run: npm run build

  notify-failure:
    needs: build-webui
    # Surface nightly build breakage as a GitHub issue. Scheduled runs only —
    # PR failures already show up as PR checks.
    if: ${{ failure() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/notify-nightly-failure
        with:
          title: Nightly WebUI build failed on master
          body: |
            The nightly WebUI build (npm run build) failed on master.

            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          token: ${{ secrets.GITHUB_TOKEN }}
