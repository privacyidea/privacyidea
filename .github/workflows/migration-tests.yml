#
# Runs database migration tests against MariaDB and PostgreSQL containers.
# These tests are intentionally separate from the standard unit tests
# so they can be triggered and reviewed independently.
#

name: Migration Tests

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
    branches:
      - 'master'
      - 'branch-*'
    paths:
      - 'privacyidea/migrations/**'
      - 'privacyidea/models/**'
      - 'tests/test_migrations.py'
      - 'tests/test_migration_*.py'
      - 'tests/testdata/migrations/**'
      - 'privacyidea/cli/pimanage/backup.py'
      - 'tests/cli/test_backup_roundtrip.py'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/migration-tests.yml'
      - '.github/python-versions.env'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  migration-tests:
    name: Migration tests (${{ matrix.db.label }})
    permissions:
      checks: write
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        db:
          # MariaDB 10.11 is the LTS most installs run (Ubuntu 24.04 default);
          # 11.x is the rolling latest. Migrations emit version-specific DDL, so
          # both are exercised (this job is path-gated to migration/model
          # changes, so the extra entry rarely runs). Both versions run as static
          # service containers below — 10.11 on host port 3306, 11 on 3307 — so
          # the image stays a literal tag; a ${{ }} expression in image: is
          # flagged by zizmor as an unpinned reference. Each entry's db_url
          # targets the right port.
          - label: MariaDB 10.11
            db_url: "mysql+pymysql://privacyidea:privacyidea@127.0.0.1:3306/privacyidea_migration_test"
            pip_extra: "PyMySQL"

          - label: MariaDB 11
            db_url: "mysql+pymysql://privacyidea:privacyidea@127.0.0.1:3307/privacyidea_migration_test"
            pip_extra: "PyMySQL"

          - label: PostgreSQL
            db_url: "postgresql+psycopg2://privacyidea:privacyidea@127.0.0.1:5432/privacyidea_migration_test"
            pip_extra: "psycopg2-binary"

    services:
      mariadb1011:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: privacyidea_migration_test
          MARIADB_USER: privacyidea
          MARIADB_PASSWORD: privacyidea
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mariadb11:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: privacyidea_migration_test
          MARIADB_USER: privacyidea
          MARIADB_PASSWORD: privacyidea
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      postgresql:
        image: postgres:17
        env:
          POSTGRES_DB: privacyidea_migration_test
          POSTGRES_USER: privacyidea
          POSTGRES_PASSWORD: privacyidea
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U privacyidea"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Load Python versions
        id: pyversions
        run: |
          set -a; source .github/python-versions.env; set +a
          echo "migration=$MIGRATION" >> "$GITHUB_OUTPUT"

      - name: Set up Python ${{ steps.pyversions.outputs.migration }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ steps.pyversions.outputs.migration }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            tests/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install ${{ matrix.db.pip_extra }}

      - name: Run migration tests
        env:
          TEST_DATABASE_URL: ${{ matrix.db.db_url }}
          PYTHONWARNINGS: "once::DeprecationWarning"
        run: |
          python -b -m pytest -v --tb=short -m migration tests/test_migrations.py tests/test_migration_*.py

      # pi-manage backup shells out to mysqldump/mysql. Install MariaDB's client
      # (which provides the mysqldump compat name) and fail loudly if it is
      # missing, so the round-trip below runs for real instead of self-skipping.
      - name: Install MariaDB client for backup round-trip
        if: startsWith(matrix.db.label, 'MariaDB')
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client
          mysqldump --version

      - name: Run backup/restore round-trip test
        if: startsWith(matrix.db.label, 'MariaDB')
        env:
          TEST_DATABASE_URL: ${{ matrix.db.db_url }}
          PYTHONWARNINGS: "once::DeprecationWarning"
        run: |
          python -b -m pytest -v --tb=short -m backup tests/cli/test_backup_roundtrip.py

  # MariaDB Galera needs server flags (wsrep provider + --wsrep-new-cluster) that
  # a `services:` container can't pass, so the node is started with `docker run`.
  # A single bootstrapped node is enough to exercise the Galera-only DDL rules
  # (e.g. sequences require INCREMENT BY 0; CACHE without it is rejected).
  galera-migration-tests:
    name: Migration tests (MariaDB Galera / Python 3.13)
    permissions:
      checks: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Start single-node MariaDB Galera cluster
        run: |
          docker run -d --name galera \
            -e MARIADB_ROOT_PASSWORD=root \
            -e MARIADB_DATABASE=privacyidea_migration_test \
            -e MARIADB_USER=privacyidea \
            -e MARIADB_PASSWORD=privacyidea \
            -p 3306:3306 \
            mariadb:11 \
            --wsrep-on=ON \
            --wsrep-provider=/usr/lib/galera/libgalera_smm.so \
            --wsrep-cluster-address=gcomm:// \
            --wsrep-cluster-name=ci-galera \
            --wsrep-node-address=127.0.0.1 \
            --binlog-format=ROW \
            --default-storage-engine=InnoDB \
            --innodb-autoinc-lock-mode=2 \
            --wsrep-new-cluster

      - name: Wait for Galera to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec galera healthcheck.sh --connect --innodb_initialized; then
              ready=$(docker exec -e MYSQL_PWD=root galera \
                mariadb -uroot -N -B -e "SHOW STATUS LIKE 'wsrep_ready'" | awk '{print $2}')
              if [ "$ready" = "ON" ]; then
                docker exec -e MYSQL_PWD=root galera \
                  mariadb -uroot -N -e "SHOW STATUS LIKE 'wsrep_cluster_size'; SHOW STATUS LIKE 'wsrep_ready'"
                echo "Galera node is ready."
                exit 0
              fi
            fi
            echo "Waiting for Galera... ($i)"
            sleep 5
          done
          echo "::error::Galera node did not become ready in time"
          docker logs galera
          exit 1

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            tests/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install PyMySQL

      - name: Run migration tests
        env:
          TEST_DATABASE_URL: "mysql+pymysql://privacyidea:privacyidea@127.0.0.1:3306/privacyidea_migration_test"
          PYTHONWARNINGS: "once::DeprecationWarning"
        run: |
          python -b -m pytest -v --tb=short -m migration tests/test_migrations.py tests/test_migration_*.py

      # Exercise pi-manage backup/restore against the Galera node — the one place
      # the mysqldump default-locking failure on sequences actually reproduces.
      - name: Install MariaDB client for backup round-trip
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client
          mysqldump --version

      - name: Run backup/restore round-trip test
        env:
          TEST_DATABASE_URL: "mysql+pymysql://privacyidea:privacyidea@127.0.0.1:3306/privacyidea_migration_test"
          PYTHONWARNINGS: "once::DeprecationWarning"
        run: |
          python -b -m pytest -v --tb=short -m backup tests/cli/test_backup_roundtrip.py
