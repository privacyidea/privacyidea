version: 2
updates:
  - package-ecosystem: "github-actions"
    # Check GitHub actions weekly for updates
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  # Python and npm dependencies are updated manually on our schedule.
  # Dependabot PRs for these ecosystems tend to fail CI and create noise
  # without saving work. Vulnerability detection is covered by pip-audit
  # (Python) and osv-scanner (npm/Python).
