# configuration related to pull request comments
#comment: no # do not comment PR with the result

coverage:
  range: 70..90 # coverage lower than 70 is red, higher than 90 green, between color code

  status:
    project: # settings affecting project coverage
      default:
        target: auto # auto % coverage target
        threshold: 3%  # allow for 3% reduction of coverage without failing

    # do not run coverage on patch nor changes
    patch: off

# Migration scripts are one-shot, version-pinned artifacts with many
# dialect-specific branches (MariaDB/Postgres/Oracle). The coverage suite is run
# with `-m "not migration"`, so their bodies are never executed in the uploaded
# report and would otherwise count as pure misses. They are still exercised by
# the migration test suite (test_migrations.py, test_sequence_ddl.py).
ignore:
  - "privacyidea/migrations/**"
