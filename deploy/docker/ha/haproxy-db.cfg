global
    maxconn 1024

defaults
    mode tcp
    timeout connect 5s
    timeout client  300s
    timeout server  300s
    option clitcpka       # Client (pi nodes) TCP keep-alive to stop docker from dropping idle sockets
    option srvtcpka       # Server (db nodes) TCP keep-alive to stop docker from dropping idle sockets

frontend db-in
    bind *:3306
    default_backend db-nodes

backend db-nodes
    option tcp-check
    server db1 db-1:3306 check
    server db2 db-2:3306 check backup
