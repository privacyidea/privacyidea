global
    maxconn 1024
    # Send access logs to Docker stdout so they appear in 'docker logs' / 'make logs'
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    log global
    option httplog

# Stats dashboard — bound to localhost only (127.0.0.1:8404 in compose)
# Access at http://localhost:8404/stats
# Consider adding 'stats auth user:password' for production deployments
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats hide-version
    no log

frontend http-in
    bind *:8000
    default_backend pi-nodes

# Use Docker's internal DNS to discover scaled containers
resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s

backend pi-nodes
    balance roundrobin
    # Point HAProxy's health check specifically to the readiness endpoint
    option httpchk GET /healthz/readyz
    # Expect a 200 OK response, otherwise mark the node as DOWN
    http-check expect status 200
    # Create a template for up to 10 dynamically scaled workers (containers)
    server-template pi-worker 1-10 pi:8080 check resolvers docker_dns init-addr none
