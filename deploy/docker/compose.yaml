# Single-node privacyIDEA stack: one MariaDB plus the three roles of the
# privacyIDEA image (init, web, cron), all built from the same Dockerfile and
# selected by environment variables in entrypoint.sh:
#   pi-init  PI_INIT_ONLY=true  — create tables, run migrations, bootstrap admin,
#                                 install the enckey canary, then exit
#   pi       (default)          — gunicorn web workers
#   pi-cron  PI_CRON_MODE=true  — maintenance scheduler (audit rotate, challenge
#                                 cleanup, UI-configured periodic tasks)
#
# This is the standalone counterpart to the HA stack in ./ha/. It has no load
# balancer and no database replication — for that see ./ha/ha-compose.yaml.

name: privacyIDEA

# Shared build + wiring for the three privacyIDEA roles. Each service overrides
# only the env vars that make it an init/web/cron container.
x-pi-common: &pi-common
  build:
    context: "../../"
    dockerfile: ./deploy/docker/Dockerfile
    network: host
  # image: privacyidea/privacyidea:<tag>   # use instead of build: once published
  secrets:
    - enckey
    - secret_key
    - pi_pepper
    - mariadb_password
  env_file:
    # Optional: additional PRIVACYIDEA_-prefixed config keys, applied to all roles.
    - ./example.env
  environment: &pi-common-env
    # PI_DB_* match ConfigKey names so DockerConfig builds the URI directly.
    # This also makes pi-manage work when exec'd into the container manually.
    PI_DB_USER: pi
    PI_DB_HOST: db
    PI_DB_NAME: pi
    PI_DB_PASSWORD_FILE: /run/secrets/mariadb_password
    # enckey, pepper and secret_key are read from these files by DockerConfig.
    PI_ENCFILE: /run/secrets/enckey
    PI_PEPPER_FILE: /run/secrets/pi_pepper
    SECRET_KEY_FILE: /run/secrets/secret_key
    # Keep pooled connections below the server's wait_timeout.
    PRIVACYIDEA_SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-250}

services:
  db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MARIADB_USER: pi
      MARIADB_PASSWORD_FILE: /run/secrets/mariadb_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
      MARIADB_DATABASE: pi
    secrets:
      - mariadb_password
      # Root password is needed by scripts/backup.sh and scripts/restore.sh.
      - mariadb_root_password
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 5
      start_period: 30s

  # One-shot: create tables, run migrations, bootstrap the admin, install the
  # enckey canary, then exit. pi and pi-cron wait for it to complete.
  pi-init:
    <<: *pi-common
    secrets:
      - enckey
      - secret_key
      - pi_pepper
      - mariadb_password
      - bootstrap_admin_password
    environment:
      <<: *pi-common-env
      PI_INIT_ONLY: "true"
      PI_CREATE_TABLES: "true"
      PI_RUN_MIGRATIONS: "true"
      PI_BOOTSTRAP_ADMIN: ${BOOTSTRAP_ADMIN:-admin}
    # Exits after its one-shot work — disable the image HEALTHCHECK (which
    # expects gunicorn on :8080) so it does not spuriously report unhealthy.
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy

  # Web workers (gunicorn). Single instance on the published port.
  pi:
    <<: *pi-common
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      <<: *pi-common-env
      PI_CREATE_TABLES: "false"
      PI_RUN_MIGRATIONS: "false"
      PI_WORKERS: ${PI_WORKERS:-4}
    depends_on:
      pi-init:
        # Workers start only after the init job has finished — no migration race.
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz/readyz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Maintenance scheduler. Keep this at a single instance — two would race on
  # deleting the same audit/challenge rows. Periodic tasks configured in the UI
  # should target node name "pi-cron" to be picked up here.
  pi-cron:
    <<: *pi-common
    restart: unless-stopped
    environment:
      <<: *pi-common-env
      PI_CRON_MODE: "true"
      PRIVACYIDEA_PI_NODE: pi-cron
      # Audit rotation — defaults shown. Set PI_CRON_AUDIT_AGE (days) to switch
      # from watermark-based to age-based rotation, e.g. PI_CRON_AUDIT_AGE=90.
      #PI_CRON_AUDIT_ROTATE: "true"
      #PI_CRON_AUDIT_HOUR: "2"
      #PI_CRON_AUDIT_HIGHWATERMARK: "50000"
      #PI_CRON_AUDIT_LOWWATERMARK: "25000"
      #PI_CRON_AUDIT_CHUNKSIZE: ""
      #PI_CRON_CHALLENGE_CLEANUP: "true"
      #PI_CRON_PERIODIC_TASKS: "true"
    healthcheck:
      disable: true
    depends_on:
      pi-init:
        condition: service_completed_successfully

  # Optional TLS-terminating reverse proxy. Not started by default; enable with:
  #   docker compose --profile tls up -d
  # Set PI_SITE_ADDRESS in .env to the public hostname — Caddy then obtains and
  # renews a Let's Encrypt certificate automatically (needs public DNS + ports
  # 80/443 reachable). For an internal host without public DNS, add "tls internal"
  # to the Caddyfile. When fronting with Caddy you can drop the pi "ports:" mapping
  # above so the app is only reachable through TLS.
  caddy:
    image: caddy:2
    profiles: ["tls"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PI_SITE_ADDRESS: ${PI_SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      pi:
        condition: service_healthy

# Secrets are read from files in ./secrets/. Run "make init" (or the commands in
# secrets/README.md) to generate them before the first "docker compose up".
secrets:
  enckey:
    # head -c 96 /dev/urandom > secrets/enckey
    file: ./secrets/enckey
  secret_key:
    # python -c 'import secrets;print(secrets.token_hex())' > secrets/secret_key
    file: ./secrets/secret_key
  pi_pepper:
    # python -c 'import secrets;print(secrets.token_urlsafe())' > secrets/pi_pepper
    file: ./secrets/pi_pepper
  mariadb_password:
    # pwgen 20 1 > secrets/mariadb_password
    file: ./secrets/mariadb_password
  mariadb_root_password:
    # pwgen 20 1 > secrets/mariadb_root_password
    file: ./secrets/mariadb_root_password
  bootstrap_admin_password:
    # password for the initial admin account created by pi-init
    file: ./secrets/bootstrap_admin_password

volumes:
  db-data:
  caddy-data:
  caddy-config:
