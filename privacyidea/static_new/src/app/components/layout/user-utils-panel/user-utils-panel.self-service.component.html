<div class="utils-group-self-service utils">
  @if (!wizard()) {
    <app-theme-switcher></app-theme-switcher>
    <button
      (click)="refreshPage()"
      class="refresh-btn"
      mat-icon-button
      matTooltip="Refresh Resources">
      <mat-icon>refresh</mat-icon>
    </button>
  }
  <button
    (click)="logout()"
    aria-label="Logout"
    class="logout-btn"
    i18n-aria-label
    mat-icon-button
    matTooltip="Logout">
    <mat-icon>logout</mat-icon>
  </button>
  <div
    [ngClass]="[
      sessionTimerService.remainingTime()! < 31000
        ? 'red-light'
        : sessionTimerService.remainingTime()! < 60000
          ? 'yellow-light'
          : 'surface-highest'
    ]"
    class="session-timer padding-8"
    matTooltip="Time until session expires">
    {{ sessionTimerService.remainingTime() | date: sessionTimeFormat() : "UTC" }}
  </div>
</div>
