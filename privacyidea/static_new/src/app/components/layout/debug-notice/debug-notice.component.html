@if (visible()) {
  <div
    class="debug-ribbon"
    role="status"
    aria-label="privacyIDEA is running in debug mode. Disable it in production environments."
    i18n-aria-label>
    <span
      class="debug-ribbon-text"
      matTooltip="privacyIDEA is running in debug mode. Disable it in production environments."
      matTooltipPosition="right"
      i18n-matTooltip
      i18n>
      Debug
    </span>
  </div>
}
