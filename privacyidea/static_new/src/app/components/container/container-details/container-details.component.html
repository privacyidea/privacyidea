<div
  appScrollToTop
  aria-label="Details"
  class="details-container"
  i18n-aria-label>
  <div class="details-flex-layout flex-column">
    <app-details-header
      [serial]="containerSerial()"
      entityLabel="Container"
      [showAuditButton]="authService.actionAllowed('auditlog')"
      [auditRoute]="ROUTE_PATHS.AUDIT"
      auditTooltip="Show container in audit log"
      (auditClick)="showContainerAuditLog()">
    </app-details-header>
    <div class="container-actions-bar">
      <app-container-details-actions
        [containerSerial]="containerSerial()"
        [containerType]="containerType()"></app-container-details-actions>
    </div>
    <div
      class="details-grid">
      @if (descriptionRow(); as desc) {
        <app-details-card
          class="details-card--description"
          [class.is-editing]="desc.isEditing()"
          title="Description"
          i18n-title>
          <div class="value-row">
            <div class="value-content">
              @if (desc.isEditing()) {
                <mat-form-field
                  class="input-width-xl"
                  subscriptSizing="dynamic">
                  <textarea
                    [value]="desc.value"
                    (input)="desc.value = $any($event.target).value"
                    i18n-placeholder
                    matInput
                    placeholder="Enter description"
                    rows="3"></textarea>
                </mat-form-field>
              } @else {
                <span class="description-text">{{ desc.value || "—" }}</span>
              }
            </div>
            <div class="value-edit">
              @if (isEditableElement(desc.keyMap.key)) {
                <app-edit-buttons
                  [cancelEdit]="cancelContainerEdit.bind(this)"
                  [element]="desc"
                  [isEditingInfo]="isEditingInfo()"
                  [isEditingUser]="isEditingUser()"
                  [saveEdit]="saveContainerEdit.bind(this)"
                  [shouldHideEdit]="isAnyEditing()"
                  [toggleEdit]="toggleContainerEdit.bind(this)"></app-edit-buttons>
              }
            </div>
          </div>
        </app-details-card>
      }

      <app-details-card
        class="details-card--group"
        title="Status"
        i18n-title>
        <div class="details-field-list">
          <app-container-details-states
            [states]="selectedStates()"
            [blockEditing]="isAnyEditing()" />
          @if (lastAuthenticationDisplay()) {
            <app-detail-field
              label="Last Authentication"
              i18n-label
              [displayText]="lastAuthenticationDisplay()" />
          }
          @if (lastSynchronizationDisplay()) {
            <app-detail-field
              label="Last Synchronization"
              i18n-label
              [displayText]="lastSynchronizationDisplay()" />
          }
          @if (registrationStateDisplay()) {
            <app-detail-field
              label="Registration State"
              i18n-label
              [displayText]="registrationStateDisplay()" />
          }
        </div>
      </app-details-card>

      <app-details-card
        class="details-card--group"
        title="Container"
        i18n-title>
        <div class="details-field-list">
          <app-detail-field
            label="Type"
            i18n-label
            [displayText]="str(containerDetails().type)" />
          <app-detail-field
            label="Template"
            i18n-label
            [displayText]="str(containerDetails().template)" />
          <app-container-details-realms
            [realms]="selectedRealms()"
            [userRealm]="userRealm()"
            [blockEditing]="isAnyEditing()" />
        </div>
      </app-details-card>

      <app-container-details-user
        class="details-card--user"
        [host]="this"
        [userData]="userData()" />

      <app-details-card class="details-card--add-token">
        <app-container-add-token
          [authService]="authService"
          [(showOnlyTokenInContainer)]="showOnlyTokenInContainer"
          [total]="total()"
          [pageIndex]="pageIndex()"
          [pageSize]="pageSize()"
          [filterValue]="tokenService.tokenFilter().filterString"
          [filterIsNotEmpty]="tokenService.tokenFilter().isNotEmpty"
          [tokenOptions]="tokenDataSource().data"
          (pageEvent)="onPageEvent($event)"
          (filterInput)="tokenService.handleFilterInput($event)"
          (clearFilter)="tokenService.clearFilter()"
          (addToken)="addTokenToContainer($event)">
        </app-container-add-token>
      </app-details-card>

      <app-details-card class="details-card--tokens">
        <app-container-details-token-table [containerTokenData]="containerTokenData()" />
      </app-details-card>

      <app-details-card
        class="details-info-area"
        title="Information"
        i18n-title
        [collapsible]="true"
        [collapseLocked]="isEditingInfo()">
        <app-container-details-info
          [detailData]="containerDetailData()"
          [infoData]="infoData()"
          [isAnyEditingOrRevoked]="isAnyEditing()"
          [(isEditingInfo)]="isEditingInfo"
          [isEditingUser]="isEditingUser()" />
      </app-details-card>
    </div>
  </div>
</div>
