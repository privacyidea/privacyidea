<div class="info-container">
  <span
    class="info-title details-key-row"
    i18n>
    Information
  </span>
  <table
    [dataSource]="infoData()"
    aria-label="Container Details Data Table"
    class="info-table"
    i18n-aria-label
    mat-table>
    <ng-container matColumnDef="value">
      <td
        *matCellDef="let element"
        [ngClass]="[isEditingInfo() ? 'padding-0' : '']"
        class="height-52 width-241"
        mat-cell>
        <div class="info-value-container">
          <mat-list>
            @for (key of Object.keys(element.value); track key) {
              @if (isEditingInfo()) {
                <div class="flex-row">
                  <mat-list-item class="height-auto">
                    <div class="flex-row">
                      <mat-form-field
                        class="input-width-s"
                        subscriptSizing="dynamic">
                        <mat-label>{{ key }}</mat-label>
                        <textarea
                          [(ngModel)]="element.value[key]"
                          class="info-input"
                          matInput
                          rows="1"></textarea>
                      </mat-form-field>
                      <button
                        (click)="deleteInfo(key)"
                        class="delete-info-button"
                        mat-icon-button>
                        <mat-icon>delete_outlined</mat-icon>
                      </button>
                    </div>
                  </mat-list-item>
                </div>
              } @else {
                <mat-list-item class="height-auto info-row">
                  <div class="info-span">
                    <span class="info-span-title"> {{ key }}: </span>
                    <span class="info-span-value">{{ element.value[key] }}</span>
                    <mat-divider class="info-divider" />
                  </div>
                </mat-list-item>
              }
            }
            @if (isEditingInfo()) {
              <mat-divider class="margin-8" />
              <mat-list-item class="height-auto">
                <div class="flex-column">
                  <mat-form-field
                    class="input-width-s"
                    subscriptSizing="dynamic">
                    <input
                      [(ngModel)]="newInfo().key"
                      i18n-placeholder
                      matInput
                      placeholder="Add new key" />
                  </mat-form-field>
                  <mat-form-field
                    class="input-width-s"
                    subscriptSizing="dynamic">
                    <textarea
                      [(ngModel)]="newInfo().value"
                      i18n-placeholder
                      matInput
                      placeholder="Add new info"
                      rows="1"></textarea>
                  </mat-form-field>
                </div>
              </mat-list-item>
            }
          </mat-list>
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="edit">
      <td
        *matCellDef="let element"
        class="height-52 edit-column-cell"
        mat-cell>
        @if (authService.actionAllowed("container_info")) {
          <app-edit-buttons
            [cancelEdit]="toggleInfoEdit.bind(this)"
            [element]="element"
            [isEditingInfo]="isEditingInfo"
            [isEditingUser]="isEditingUser"
            [saveEdit]="saveInfo.bind(this)"
            [shouldHideEdit]="isAnyEditingOrRevoked"
            [toggleEdit]="toggleInfoEdit.bind(this)" />
        }
      </td>
    </ng-container>
    <tr
      *matRowDef="let row; columns: ['value', 'edit']"
      class="height-52"
      mat-row></tr>
  </table>
</div>
