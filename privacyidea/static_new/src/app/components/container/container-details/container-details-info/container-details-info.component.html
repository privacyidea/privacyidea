@if (infoData()[0]; as element) {
  @let info = asMap(element.value);
  @if (authService.actionAllowed("container_info")) {
    <div class="info-actions-row">
      <app-edit-buttons
        [cancelEdit]="toggleInfoEdit.bind(this)"
        [element]="$any(element)"
        [isEditingInfo]="isEditingInfo()"
        [isEditingUser]="isEditingUser()"
        [saveEdit]="saveInfo.bind(this)"
        [shouldHideEdit]="isAnyEditingOrRevoked()"
        [toggleEdit]="toggleInfoEdit.bind(this)"></app-edit-buttons>
    </div>
  }
  <dl class="info-grid">
    @for (key of displayInfoKeys(info); track key) {
      <dt class="info-key">{{ key }}:</dt>
      <dd class="info-value">
        @if (isEditingInfo()) {
          <div class="info-edit-row">
            <mat-form-field
              class="info-edit-field input-width-l"
              subscriptSizing="dynamic">
              <textarea
                [value]="info[key]"
                (input)="info[key] = $any($event.target).value"
                matInput
                rows="1"></textarea>
            </mat-form-field>
            <button
              (click)="deleteInfo(key)"
              aria-label="Delete Information"
              i18n-aria-label
              mat-icon-button>
              <mat-icon>delete_outlined</mat-icon>
            </button>
          </div>
        } @else {
          <span>{{ info[key] }}</span>
        }
      </dd>
    }
  </dl>
  @if (isEditingInfo()) {
    <mat-divider class="margin-8" />
    <div class="info-add-row">
      <mat-form-field
        class="input-width-s"
        subscriptSizing="dynamic">
        <input
          [value]="newInfo().key"
          (input)="newInfo.set({ key: $any($event.target).value, value: newInfo().value })"
          i18n-placeholder
          matInput
          placeholder="Add new key" />
      </mat-form-field>
      <span class="margin-right-16 flex ali-center">:</span>
      <mat-form-field
        class="input-width-xl"
        subscriptSizing="dynamic">
        <textarea
          [value]="newInfo().value"
          (input)="newInfo.set({ key: newInfo().key, value: $any($event.target).value })"
          i18n-placeholder
          matInput
          placeholder="Add new info"
          rows="1"></textarea>
      </mat-form-field>
    </div>
  }
}
