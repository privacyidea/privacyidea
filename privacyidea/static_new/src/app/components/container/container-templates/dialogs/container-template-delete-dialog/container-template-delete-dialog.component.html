<app-dialog-wrapper
  title="Delete Container Template"
  i18n-title
  [showCancelButton]="true"
  [actions]="actions()"
  (onAction)="onAction($event)">
  <div class="delete-confirmation-container">
    <mat-icon class="warn-icon">warning</mat-icon>
    <div class="message-content">
      @if (data.length === 1) {
        <p i18n>
          Are you sure you want to delete the template <b>{{ data[0].name }}</b
          >?
        </p>
      } @else {
        <p i18n>Are you sure you want to delete the following templates?</p>
        <ul class="template-list">
          @for (template of data; track template.name) {
            <li>
              <b>{{ template.name }}</b>
            </li>
          }
        </ul>
      }
      <p
        class="sub-message"
        i18n>
        This action cannot be undone.
      </p>
    </div>
  </div>
</app-dialog-wrapper>
