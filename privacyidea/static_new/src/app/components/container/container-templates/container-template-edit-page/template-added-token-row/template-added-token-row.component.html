<mat-expansion-panel class="token-card">
  <mat-expansion-panel-header>
    <mat-panel-title>
      {{ tokenEnrollmentPayload().type }}
    </mat-panel-title>
    <div class="token-actions">
      <mat-checkbox
        [checked]="userAssign()"
        (change)="toggleUserAssign($event.checked)"
        (click)="$event.stopPropagation()"
        i18n>
        Assign to user
      </mat-checkbox>
      <button
        mat-icon-button
        (click)="emitRemoveToken(); $event.stopPropagation()">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-expansion-panel-header>

  <div class="margin-bottom-16">
    {{ tokenTypeDescription() }}
  </div>

  <app-enroll-token-type-switch
    [tokenTypeKey]="tokenEnrollmentPayload().type"
    [enrollmentData]="$any(tokenEnrollmentData())" />
</mat-expansion-panel>
