<app-dialog-wrapper
  title="Container Successfully Created"
  i18n-title
  [actions]="dialogActions()"
  (action)="onDialogAction($event)">
  <div class="progress-header">
    <span
      class="progress-label"
      i18n>
      Token {{ currentIndex() + 1 }} / {{ total() }}
    </span>
    <span class="token-type">{{ currentToken().type | titlecase }}</span>
  </div>
  <mat-progress-bar
    [value]="progress()"
    mode="determinate"
    class="progress-bar" />
  <div class="enrollment-data">
    <p i18n>Token <strong>{{ currentToken().serial }}</strong> successfully enrolled.</p>
    <app-token-enrollment-data
      [enrolledInputData]="currentToken()"
      [tokenType]="currentToken().type" />
  </div>
</app-dialog-wrapper>
