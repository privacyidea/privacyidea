<div class="flex-column">
  @if (!wizard()) {
    <mat-checkbox
      [checked]="generateOnServer()"
      (change)="generateOnServer.set($event.checked)"
      class="server-checkbox"
      i18n>
      Generate the OTP key on the server and show a QR code to scan.
    </mat-checkbox>
    <div class="flex-row gap-16">
      @if (!this.authService.checkForceServerGenerateOTPKey("motp")) {
        <mat-form-field class="input-width-l">
          <mat-label i18n>OTP Key</mat-label>
          <input
            [formField]="otpKeyForm"
            i18n-placeholder
            matInput
            placeholder="Enter OTP key" />
          <mat-error i18n>OTP key is <strong>required</strong></mat-error>
        </mat-form-field>
      }
    </div>
  }
</div>
<div class="flex-column">
  <h4 i18n>mOTP PIN</h4>
  <span i18n>The mOTP PIN is the PIN that needs to be entered on the mobile device.</span>
  <div class="motp-pin-input">
    <app-masked-input
      [error]="motpPinError()"
      [field]="motpPinForm"
      class="input-width-l"
      i18n-label
      label="Enter Password" />
    <app-masked-input
      [error]="repeatMotpPinError()"
      [field]="repeatMotpPinForm"
      class="input-width-l"
      i18n-label
      i18n-placeholder
      label="Repeat Password"
      placeholder="Repeat Password" />
  </div>
</div>
