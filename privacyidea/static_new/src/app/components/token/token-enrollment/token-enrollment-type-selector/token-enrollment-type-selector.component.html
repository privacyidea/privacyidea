<div
  class="sticky-header"
  [appStickyHeader]="scrollContainer()">
  <div class="sticky-controls ali-center">
    <mat-form-field class="input-width-xl type-select">
      <mat-select
        [panelClass]="'multi-column-panel'"
        [value]="tokenService.selectedTokenType()"
        (selectionChange)="tokenService.selectedTokenType.set($event.value)">
        @for (type of tokenService.tokenTypeOptions(); track type) {
          <mat-option
            #tooltip="matTooltip"
            (click)="tooltip.hide()"
            [matTooltip]="type.info.split(':')[1]"
            [value]="type"
            class="select-option">
            {{ type.info.split(":")[0] }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>
    <div class="enroll-button-container margin-left-auto">
      <button
        [disabled]="formInvalid() || !tokenService.selectedTokenType()"
        class="action-button-primary button-width-m"
        mat-stroked-button
        type="submit">
        <mat-icon>add_moderator</mat-icon>
        <span i18n>Enroll Token</span>
      </button>
      <button
        (click)="reopenDialog.emit()"
        [matTooltip]="'Reopen enrollment dialog'"
        [ngClass]="{ hidden: !canReopenDialog() }"
        mat-icon-button
        type="button">
        <mat-icon>open_in_new</mat-icon>
      </button>
    </div>
  </div>
</div>
