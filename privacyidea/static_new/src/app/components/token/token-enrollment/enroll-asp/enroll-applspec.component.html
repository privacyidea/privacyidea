<div class="flex-column">
  @if (!wizard) {
    <mat-checkbox
      [checked]="generateOnServer()"
      [disabled]="authService.checkForceServerGenerateOTPKey('applspec') || disabled()"
      (change)="generateOnServer.set($event.checked)"
      class="server-checkbox"
      i18n>
      Generate the static password on the Server
    </mat-checkbox>
  }

  <div class="flex-row gap-16">
    @if (!authService.checkForceServerGenerateOTPKey("applspec")) {
      <mat-form-field
        class="input-width-l">
        <mat-label i18n>Application Specific Password</mat-label>
        <input
          [formField]="otpKeyForm"
          i18n-placeholder
          matInput
          placeholder="Enter static password" />
      </mat-form-field>
    }

    <mat-form-field class="input-width-l">
      <mat-label i18n>Service ID</mat-label>
      <mat-select
        [value]="serviceId()"
        (selectionChange)="serviceId.set($event.value)"
        [disabled]="disabled()"
        required>
        @for (option of serviceIdOptions(); track option) {
          <mat-option [value]="option">{{ option }}</mat-option>
        }
      </mat-select>
      <mat-error i18n>Service ID is <strong>required</strong></mat-error>
    </mat-form-field>
  </div>
</div>
