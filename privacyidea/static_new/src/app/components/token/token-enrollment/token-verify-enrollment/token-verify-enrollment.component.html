<app-dialog-wrapper
  title="Verify Token Enrollment"
  i18n-title="@@tokenEnrollVerifyTitle"
  [showCancelButton]="true"
  cancelButtonLabel="Close"
  i18n-cancelButtonLabel="@@closeButtonLabel"
  (close)="close()">

  <!--  Placeholder basic text-->

  <span i18n>However, to activate your token you still need to verify the enrollment.</span>

  @if (enrollDetails) {
    <app-token-enrollment-data
      [enrolledData]="enrollDetails"
      [tokenType]="tokenType"></app-token-enrollment-data>
  }

  <div class="margin-top-16">
    <h3 i18n>Verify Enrollment</h3>
  </div>
  <div class="verify-container">
    <mat-form-field class="width-100">
      <mat-label i18n>OTP</mat-label>
      <input
        [formControl]="verifyOTPControl"
        matInput />
      <mat-hint>
        {{ verifyMessage }}
      </mat-hint>
    </mat-form-field>
    <button
      class="action-button-1"
      mat-stroked-button
      (click)="verifyOTP()"
      i18n>Verify
    </button>
  </div>

</app-dialog-wrapper>
