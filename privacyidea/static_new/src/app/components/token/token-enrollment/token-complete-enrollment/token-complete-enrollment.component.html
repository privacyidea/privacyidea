<app-dialog-wrapper
  title="Complete Token Enrollment"
  i18n-title="@@tokenEnrollCompleteTitle"
  [showCancelButton]="true"
  [actions]="dialogActions()"
  (onAction)="onDialogAction($event)"
  cancelButtonLabel="Close"
  i18n-cancelButtonLabel="@@closeButtonLabel"
  (close)="close()">

 <span
   class="margin-bottom-16"
   i18n>
    Your token with serial {{ enrollDetails?.serial }} is not completely enrolled, yet.
 </span>

  <app-token-enrollment-data
    [enrolledInputData]="enrollDetails"
    [tokenType]="tokenType"
    [enrollmentParameters]="enrollParameters"></app-token-enrollment-data>

  @if (twoStepEnrollment()) {
    <div class="margin-top-16">
      <div i18n>
        Please scan the QR code with the privacyIDEA Authenticator app and enter the generated code below.
      </div>
      <mat-form-field class="width-100">
        <mat-label i18n>Client Part</mat-label>
        <input
          [formControl]="clientPartControl"
          matInput />
        <mat-hint>
          Code generated by the Authenticator App.
        </mat-hint>
      </mat-form-field>
    </div>
  }

</app-dialog-wrapper>
