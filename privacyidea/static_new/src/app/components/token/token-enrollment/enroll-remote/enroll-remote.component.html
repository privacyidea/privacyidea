<div class="flex-column">
  <mat-checkbox
    [checked]="checkPinLocally()"
    (change)="checkPinLocally.set($event.checked)"
    class="margin-bottom-16"
    i18n>
    Check the PIN locally
  </mat-checkbox>
  <div class="flex-row gap-16">
    <mat-form-field class="input-width-l margin-bottom-16">
      <mat-label i18n>Remote Server</mat-label>
      <mat-select
        [value]="remoteServer()"
        (selectionChange)="remoteServer.set($event.value)"
        required>
        @for (option of remoteServerOptions(); track option) {
          <mat-option [value]="option">{{ option.name }}</mat-option
          ><!-- Assuming option is the RemoteServer object -->
        }
      </mat-select>
      <mat-error
        class="red"
        i18n>
        Remote Server is <strong>required</strong>
      </mat-error>
    </mat-form-field>
    <mat-form-field class="input-width-l">
      <mat-label i18n>Remote Serial</mat-label>
      <input
        [formField]="remoteSerialForm"
        matInput />
      <mat-error i18n>Remote Serial is <strong>required</strong></mat-error>
    </mat-form-field>
  </div>
  <div class="flex-row gap-16">
    <mat-form-field class="input-width-l">
      <mat-label i18n>Remote User</mat-label>
      <input
        [formField]="remoteUserForm"
        matInput />
      <mat-error i18n>Remote User is <strong>required</strong></mat-error>
    </mat-form-field>
    <mat-form-field class="input-width-l">
      <mat-label i18n>Remote Realm</mat-label>
      <input
        [formField]="remoteRealmForm"
        matInput />
    </mat-form-field>
    <mat-form-field class="input-width-l">
      <mat-label i18n>Remote Resolver</mat-label>
      <input
        [formField]="remoteResolverForm"
        matInput />
      <mat-error i18n>Remote Resolver is <strong>required</strong></mat-error>
    </mat-form-field>
  </div>
</div>
