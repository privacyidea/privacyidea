<app-dialog-wrapper
  title="{{title()}}"
  [showCancelButton]="true"
  cancelButtonLabel="Close"
  i18n-cancelButtonLabel="@@closeButtonLabel"
  (close)="close()">

  <app-token-enrolled-text
    [serial]="serial"
    [containerSerial]="containerSerial"
    [username]="data.enrollParameters.data.user"
    [userRealm]="data.enrollParameters.data.realm"
    [onlyAddToRealm]="data.enrollParameters.data.onlyAddToRealm"
    [rollover]="data.rollover ?? false"
    (switchRoute)="onSwitchRoute()"></app-token-enrolled-text>

  @if (data.showEnrollData !== false) {
    <app-token-enrollment-data
      [enrolledInputData]="data.response?.detail"
      [tokenType]="data.tokenType"
      [enrollmentParameters]="data.enrollParameters"></app-token-enrollment-data>
  }

</app-dialog-wrapper>
