<div class="template-card">
  <mat-expansion-panel
    #panel
    class="margin-4"
    [disabled]="isTemplateEdited()"
    (closed)="handleCollapse(panel)">
    <mat-expansion-panel-header>
      @if (currentTemplate().default) {
        <div
          class="template-default-indicator-container"
          matTooltip="{{ getDefaultTooltip() }}">
          <button
            mat-icon-button
            [disabled]="!isEditMode()"
            (click)="$event.stopPropagation(); onDefaultToggle()">
            <mat-icon>star</mat-icon>
          </button>
        </div>
      } @else {
        <div
          class="template-default-indicator-container"
          matTooltip="{{ getDefaultTooltip() }}">
          <button
            mat-icon-button
            [disabled]="!isEditMode()"
            (click)="$event.stopPropagation(); onDefaultToggle()">
            <mat-icon>star_border</mat-icon>
          </button>
        </div>
      }
      <div class="template-name-container">
        <div class="template-name-plain">
          {{ currentTemplate().name }}
        </div>
      </div>
      <div class="template-type-select-container">
        <div class="template-type-plain">
          {{ currentTemplate().container_type }}
        </div>
      </div>
    </mat-expansion-panel-header>
    <div class="flex-column">
      @if (isEditMode() && currentTemplate().container_type !== "") {
        <app-container-template-add-token-chips
          [containerType]="currentTemplate().container_type"
          (onAddToken)="onAddToken($event)" />
      }
      <div class="addedTokensList">
        @for (token of currentTemplate().template_options.tokens; track $index) {
          <app-template-added-token-row
            [token]="token"
            [index]="$index"
            [isEditMode]="isEditMode()"
            (onEditToken)="onEditToken($event, $index)"
            (onRemoveToken)="onDeleteToken($event)">
          </app-template-added-token-row>
        }
      </div>
    </div>
  </mat-expansion-panel>
</div>
