<div
  class="container-templates-layout"
  aria-label="Container Templates Layout">
  <app-container-templates-filter
    [initialFilter]="filter()"
    (filterChange)="filter.set($event)">
  </app-container-templates-filter>
  <app-container-templates-table-actions [selectedContainerTemplates]="selectedContainerTemplates()">
  </app-container-templates-table-actions>
  <table
    mat-table
    [dataSource]="dataSource()"
    class="container-templates-table">
    <ng-container matColumnDef="select">
      <th
        mat-header-cell
        *matHeaderCellDef>
        <mat-checkbox
          (change)="$event ? toggleAllRows() : null"
          [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()">
        </mat-checkbox>
      </th>
      <td
        mat-cell
        *matCellDef="let row">
        <mat-checkbox
          (click)="$event.stopPropagation()"
          (change)="$event ? selection.toggle(row) : null"
          [checked]="selection.isSelected(row)">
        </mat-checkbox>
      </td>
    </ng-container>

    @for (column of columns | keyvalue: keepOrder; track column.key) {
      <ng-container [matColumnDef]="column.key">
        <th
          mat-header-cell
          *matHeaderCellDef>
          <div class="header-cell-content">
            @if (column.value.label) {
              <div>{{ column.value.label }}</div>
            }

            @if (column.value.filterable) {
              <button
                mat-icon-button
                (click)="onClickFilter(column.key)">
                <mat-icon> filter_alt </mat-icon>
              </button>
            }
          </div>
        </th>

        @switch (column.key) {
          @case ("name") {
            <td
              mat-cell
              *matCellDef="let element">
              <div
                class="clickable-cell"
                (click)="openEditDialog(element)">
                {{ element.name }}
              </div>
            </td>
          }
          @case ("options") {
            <td
              mat-cell
              *matCellDef="let element">
              <app-view-template-options
                class="no-padding"
                [templateOptions]="element.template_options">
              </app-view-template-options>
            </td>
          }
          @default {
            <td
              mat-cell
              *matCellDef="let element">
              <div>{{ element[column.key] }}</div>
            </td>
          }
        }
      </ng-container>
    }

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
