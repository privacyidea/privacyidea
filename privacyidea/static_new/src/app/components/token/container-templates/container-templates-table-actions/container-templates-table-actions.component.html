<div class="button-row margin-bottom-16">
  <button
    (click)="openNewTemplateDialog()"
    class="action-button-primary button-width-m"
    mat-stroked-button>
    <mat-icon>note_add</mat-icon>
    <span i18n>Create Template</span>
  </button>

  <button
    (click)="openCopyTemplateDialog()"
    [disabled]="selectedTemplates().length < 1"
    class="action-button-secondary button-width-m"
    mat-stroked-button>
    <mat-icon>content_copy</mat-icon>
    <span i18n>Copy Selected</span>
  </button>

  <button
    (click)="openDeleteTemplateDialog()"
    [disabled]="selectedTemplates().length < 1"
    class="action-button-delete-secondary button-width-m"
    mat-stroked-button>
    <mat-icon>delete</mat-icon>
    <span i18n>Delete Selected</span>
  </button>
</div>
