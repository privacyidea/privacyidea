<div class="set-pin-panel">
  <ng-content select="[panelTitle]"></ng-content>
  @if (authService.actionAllowed("setpin")) {
    <div class="set-pin-fields">
      <input
        class="hidden-input"
        type="text" />
      <input
        class="hidden-input"
        type="password" />
      <mat-form-field
        class="input-width-m"
        subscriptSizing="dynamic">
        <mat-label i18n>PIN</mat-label>
        <input
          [value]="setPinValue()"
          (input)="setPinValue.set($any($event.target).value)"
          [type]="'password'"
          matInput />
      </mat-form-field>
      <mat-form-field
        class="input-width-m"
        subscriptSizing="dynamic">
        <mat-label i18n>Repeat PIN</mat-label>
        <input
          [value]="repeatPinValue()"
          (input)="repeatPinValue.set($any($event.target).value)"
          [type]="'password'"
          matInput />
      </mat-form-field>
    </div>
  }
  <div class="set-pin-buttons">
    @if (authService.actionAllowed("setpin")) {
      <button
        (click)="setPin()"
        class="action-button-secondary button-width-l"
        mat-stroked-button>
        <mat-icon>password</mat-icon>
        <span i18n>Set PIN</span>
      </button>
    }
    @if (authService.actionsAllowed(["setrandompin", "otp_pin_set_random"])) {
      <button
        (click)="setRandomPin()"
        class="action-button-secondary button-width-l"
        mat-stroked-button>
        <mat-icon>casino</mat-icon>
        <span i18n>Random PIN</span>
      </button>
    }
  </div>
</div>
