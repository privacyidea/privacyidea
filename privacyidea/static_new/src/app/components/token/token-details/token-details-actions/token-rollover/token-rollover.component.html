<app-dialog-wrapper
  (close)="close()"
  (onAction)="rolloverToken()"
  [showCancelButton]="true"
  [title]="title()"
  [actions]="dialogActions()">
  <div>
    <app-enroll-token-type-switch
      [tokenTypeKey]="token()?.type ?? ''"
      [enrollmentData]="token()"
      (enrollmentArgsGetterChange)="updateEnrollmentArgsGetter($event)"
      (enrollmentResponseChange)="updateOnEnrollmentResponse($event)" />
  </div>
</app-dialog-wrapper>
