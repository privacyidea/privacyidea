<div class="actions-pin-input">
  <mat-form-field class="input-width-s">
    <mat-label>OTP</mat-label>
    <input
      [(ngModel)]="fristOTPValue"
      matInput />
  </mat-form-field>
  <mat-form-field class="input-width-s">
    <mat-label i18n>Repeat OTP</mat-label>
    <input
      [(ngModel)]="secondOTPValue"
      matInput />
  </mat-form-field>
</div>
<div class="actions-pin-input-button">
  <button
    (click)="resyncOTPToken()"
    class="action-button-secondary button-width-m"
    i18n
    mat-stroked-button>
    <mat-icon>sync</mat-icon>
    Resync Token
  </button>
</div>
