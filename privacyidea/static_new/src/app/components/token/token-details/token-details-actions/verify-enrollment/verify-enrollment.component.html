<div class="flex-column">
  <mat-form-field class="input-width-s">
    <mat-label i18n>OTP</mat-label>
    <input
      [formControl]="otpControl"
      matInput />
  </mat-form-field>

  <button
    mat-stroked-button
    class="action-button-secondary button-width-m"
    [disabled]="otpControl.invalid"
    (click)="verifyOTP()">
    <mat-icon>verified_user</mat-icon>
    <span i18n>Verify Enrollment</span>
  </button>
</div>
