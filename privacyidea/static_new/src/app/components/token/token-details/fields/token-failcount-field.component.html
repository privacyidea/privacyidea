<div
  class="detail-field-key"
  i18n>
  Fail Count
</div>
<div class="detail-field-value">
  <div class="value-row">
    <div class="value-content">
      <div [ngClass]="[tableUtilsService.getDivClassForKey('failcount')]">
        <span
          [ngClass]="[
            tableUtilsService.getSpanClassForKey({ key: 'failcount', value: value(), maxfail: maxfail() })
          ]">
          {{ tableUtilsService.getDisplayTextForKeyAndRevoked("failcount", value(), tokenService.tokenIsRevoked()) }}
        </span>
      </div>
    </div>
    <div class="value-edit">
      @if (!disabled() && authService.actionAllowed("reset")) {
        <button
          mat-icon-button
          (click)="reset()"
          i18n-aria-label="Reset Fail Count">
          <mat-icon>lock_reset</mat-icon>
        </button>
      }
    </div>
  </div>
</div>
