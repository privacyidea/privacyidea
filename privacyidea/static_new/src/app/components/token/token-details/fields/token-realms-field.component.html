<div
  class="detail-field-key"
  i18n>
  Token Realms
</div>
<div class="detail-field-value">
  <div class="value-row">
    <div class="value-content">
      @if (isEditing()) {
        <mat-form-field
          class="input-width-m height-77"
          subscriptSizing="dynamic">
          <mat-label i18n>Select Realms</mat-label>
          <mat-select
            [value]="realmService.selectedRealms()"
            (selectionChange)="realmService.selectedRealms.set($event.value)"
            appAutofocus
            multiple>
            @for (option of realmService.realmOptions(); track option) {
              @if (option === userRealm()) {
                <mat-option
                  disabled
                  value="{{ option }}">
                  {{ option }}
                </mat-option>
              } @else {
                <mat-option value="{{ option }}">{{ option }}</mat-option>
              }
            }
          </mat-select>
        </mat-form-field>
      } @else {
        <app-details-list-display [items]="realms()" />
      }
    </div>
    <div class="value-edit">
      @if (editable()) {
        <app-edit-buttons
          [element]="editButtonsElement"
          [toggleEdit]="toggle"
          [saveEdit]="commit"
          [cancelEdit]="cancel"
          [shouldHideEdit]="shouldHideEdit()"
          [isEditingUser]="false"
          [isEditingInfo]="false"></app-edit-buttons>
      }
    </div>
  </div>
</div>
