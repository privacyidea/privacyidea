<div
  class="detail-field-key"
  i18n>
  Status
</div>
<div class="detail-field-value">
  @if (!disabled() && authService.actionAllowed(tokenService.tokenIsActive() ? "disable" : "enable")) {
    <button
      type="button"
      class="status-toggle"
      (click)="toggle()"
      i18n-aria-label="Toggle Status">
      <span
        [ngClass]="[
          tableUtilsService.getSpanClassForKey({
            key: 'active',
            value: tokenService.tokenIsActive(),
            maxfail: maxfail()
          })
        ]">
        {{ tableUtilsService.getDisplayTextForKeyAndRevoked("active", tokenService.tokenIsActive(), tokenService.tokenIsRevoked()) }}
      </span>
    </button>
  } @else {
    <div [ngClass]="[tableUtilsService.getDivClassForKey('active')]">
      <span
        [ngClass]="[
          tableUtilsService.getSpanClassForKey({
            key: 'active',
            value: tokenService.tokenIsActive(),
            maxfail: maxfail()
          })
        ]">
        {{ tableUtilsService.getDisplayTextForKeyAndRevoked("active", tokenService.tokenIsActive(), tokenService.tokenIsRevoked()) }}
      </span>
    </div>
  }
</div>
