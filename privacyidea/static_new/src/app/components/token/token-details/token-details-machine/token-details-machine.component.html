@for (machine of machineData(); track machine.id) {
  <app-details-card
    class="machine-panel"
    [title]="'Offline Parameter'">
    <div class="machine-panel-row">
      <dl class="machine-grid">
        @for (entry of visibleEntries(machine); track entry[0]) {
          <dt class="machine-key">{{ entry[0] }}</dt>
          <dd class="machine-value">{{ entry[1] }}</dd>
        }
      </dl>
      <button
        mat-icon-button
        class="machine-delete-button"
        (click)="unassignMachine(machine.id, machine.type)"
        i18n-aria-label="Delete Offline Parameter">
        <mat-icon>delete_outlined</mat-icon>
      </button>
    </div>
  </app-details-card>
}
