<mat-dialog-content>
  @let registeredHtml = registeredHtml$ | async;
  @if (registeredHtml?.hasContent) {
    <div
      [innerHTML]="registeredHtml?.sanitized"
      class="margin-top-16"></div>
  } @else {
    <div class="margin-bottom-16">
      <h3
        class="margin-8"
        i18n>
        Container Registration Completed
      </h3>
    </div>
    <span
      i18n>The container
    <a (click)="containerSelected(data.containerSerial)"> {{ data.containerSerial }} </a> was successfully
         registered.</span>
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button
    (click)="authService.logout()"
    class="action-button-primary button-width-s"
    mat-button
    mat-dialog-close>
    Logout
  </button>
</mat-dialog-actions>
