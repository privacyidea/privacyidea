<div class="flex-row gap-8">
  <button
    (click)="onDeleteExpiredChallenges()"
    class="action-button-delete-primary button-width-m"
    i18n
    mat-stroked-button>
    <mat-icon>delete_sweep</mat-icon>
    Delete Expired
  </button>

  @if (advancedApiFilter.length > 0) {
    <button
      [matMenuTriggerFor]="advancedFilterMenu"
      class="action-button-primary button-width-m"
      mat-stroked-button
      type="submit">
      <mat-icon> filter_list</mat-icon>
      More Filter
    </button>
    <mat-menu #advancedFilterMenu="matMenu">
      @for (keyword of advancedApiFilter; track keyword) {
        <button
          (click)="onAdvancedFilterClick(keyword)"
          mat-menu-item>
          <mat-icon class="margin-right-16">{{ getFilterIconName(keyword) }}</mat-icon>
          {{ keyword }}
        </button>
      }
    </mat-menu>
  }
</div>
