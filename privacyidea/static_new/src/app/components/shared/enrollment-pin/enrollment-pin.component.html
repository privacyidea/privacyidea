<div class="flex-column">
  <h4 i18n>Set PIN</h4>
  <input
    style="display: none"
    type="text" />
  <input
    style="display: none"
    type="password" />
  <div class="flex-column">
    <mat-form-field class="input-width-l">
      <mat-label i18n>PIN</mat-label>
      <input
        [formControl]="setPinControl"
        [type]="'password'"
        matInput />
    </mat-form-field>
    <mat-form-field class="input-width-l">
      <mat-label i18n>Repeat PIN</mat-label>
      <input
        [formControl]="repeatPinControl"
        [type]="'password'"
        matInput />
    </mat-form-field>
  </div>
  @if (formGroup.hasError("pinMismatch") &&
  (formGroup.get("setPin")?.touched || formGroup.get("repeatPin")?.touched)) {
    <mat-error class="pin-error" i18n>PINs do not match.</mat-error>
  }
</div>
