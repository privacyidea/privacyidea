<button
  [matMenuTriggerFor]="inner.matMenu"
  class="filter-button"
  i18n-matTooltip
  mat-icon-button
  matTooltip="Filter by {{ label() }}">
  <mat-icon class="keyword-button-icon margin-left-0"> filter_list </mat-icon>
</button>
<app-multi-select-menu
  #inner
  [options]="options()"
  [selected]="selected()"
  [valueSuffix]="valueSuffix()"
  [allowCustom]="allowCustom()"
  (selectionChange)="selectionChange.emit($event)"
  (addCustom)="addCustom.emit()" />
