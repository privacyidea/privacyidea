<div class="details-scrollable-container">
  @for (item of items(); track item) {
    <mat-list-item class="height-auto pad-0">
      <app-copyable [copyText]="item">
        <span class="font-14">• {{ item }}</span>
      </app-copyable>
    </mat-list-item>
  }
</div>
