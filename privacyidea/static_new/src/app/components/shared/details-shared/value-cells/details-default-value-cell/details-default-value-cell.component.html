@if (isEditing() && isNumber()) {
  <mat-form-field
    class="input-width-m height-52"
    subscriptSizing="dynamic">
    <input
      [value]="value()"
      (input)="value.set($any($event.target).value)"
      matInput
      type="number" />
  </mat-form-field>
} @else if (isEditing()) {
  <mat-form-field
    class="input-width-m"
    subscriptSizing="dynamic">
    <textarea
      [value]="value()"
      (input)="value.set($any($event.target).value)"
      matInput
      rows="1"></textarea>
  </mat-form-field>
} @else {
  <div [ngClass]="[divClass()]">
    <span [ngClass]="[spanClass()]">
      {{ displayText() }}
    </span>
  </div>
}
