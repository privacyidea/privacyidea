<app-detail-field-row
  [label]="label()"
  [isEditing]="field.isEditing()">
  <ng-container fieldValue>
    <app-details-default-value-cell
      [(value)]="draft"
      [isEditing]="field.isEditing()"
      [isNumber]="number()"
      [divClass]="divClass()"
      [spanClass]="spanClass()"
      [displayText]="displayText()" />
  </ng-container>
  <ng-container fieldEdit>
    @if (editable()) {
      <app-edit-buttons
        [element]="field.editButtonsElement"
        [toggleEdit]="field.toggle"
        [saveEdit]="field.commit"
        [cancelEdit]="field.cancel"
        [shouldHideEdit]="blockEditing()"
        [isEditingUser]="false"
        [isEditingInfo]="false"></app-edit-buttons>
    }
  </ng-container>
</app-detail-field-row>
