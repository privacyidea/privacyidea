<mat-form-field>
  <mat-label>{{ label() }}</mat-label>
  <input
    [class.masked-input]="masked()"
    [formField]="field()"
    [placeholder]="placeholder()"
    autocomplete="off"
    matInput
    type="text" />
  <button
    (click)="toggleMasked()"
    [attr.aria-label]="label()"
    [attr.aria-pressed]="!masked()"
    mat-icon-button
    matSuffix
    type="button">
    <mat-icon>{{ masked() ? "visibility_off" : "visibility" }}</mat-icon>
  </button>
  @if (hint()) {
    <mat-hint>{{ hint() }}</mat-hint>
  }
  @if (error()) {
    <mat-error>{{ error() }}</mat-error>
  }
</mat-form-field>
