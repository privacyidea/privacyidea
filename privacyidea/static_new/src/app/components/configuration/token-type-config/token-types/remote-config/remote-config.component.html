<mat-expansion-panel>
  <mat-expansion-panel-header>
    <mat-panel-title i18n>Remote</mat-panel-title>
  </mat-expansion-panel-header>
  <div class="panel-content expansion-well">
    <p i18n>The Remote token forwards the authentication request to another privacyIDEA server.</p>

    <div class="flex-row gap-16 ali-center">
      <mat-checkbox
        [(ngModel)]="formData()['remote.verify_ssl_certificate']"
        i18n>Verify SSL certificate
      </mat-checkbox>
    </div>

    <div class="flex-row gap-16 ali-center">
      <mat-form-field
        appearance="fill"
        class="input-width-l">
        <mat-label i18n>Default Remote Server</mat-label>
        <input
          [(ngModel)]="formData()['remote.server']"
          #remoteServerInput="ngModel"
          [ngModelOptions]="{ standalone: true }"
          matInput
          placeholder="https://your.other.privacyidea.server"
          required>
        @if (remoteServerInput.errors?.['required']) {
          <mat-error i18n>Default Remote Server is <strong>required</strong></mat-error>
        }
      </mat-form-field>
    </div>
  </div>
</mat-expansion-panel>
