<div class="token-type-config-container">
  <div class="flex-row just-space-between ali-center margin-bottom-16">
    <h3 class="margin-8" i18n>Token Type Configuration</h3>
    <button
      (click)="save()"
      [disabled]="!authService.actionAllowed('configwrite')"
      class="action-button-primary button-width-m"
      mat-stroked-button>
      <mat-icon>save</mat-icon>
      <span i18n>Save Configuration</span>
    </button>
  </div>
  <mat-accordion multi="true">
    <app-hotp-config
      [formData]="formData()"
      [hashLibs]="hashLibs()"></app-hotp-config>
    <app-totp-config
      [formData]="formData()"
      [hashLibs]="hashLibs()"
      [totpSteps]="totpSteps()"></app-totp-config>
    <app-u2f-config [formData]="formData()"></app-u2f-config>
    <app-webauthn-config [formData]="formData()"></app-webauthn-config>
    <app-radius-config
      [formData]="formData()"
      [radiusServers]="systemService.radiusServerResource.value()?.result?.value ?? []"
      [expanded]="expandedPanel === 'radius'"></app-radius-config>
    <app-remote-config [formData]="formData()"></app-remote-config>
    <app-sms-config
      [formData]="formData()"
      [smsGateways]="smsGatewayNames()"
      [expanded]="expandedPanel === 'sms'"></app-sms-config>
    <app-tiqr-config [formData]="formData()"></app-tiqr-config>
    <app-email-config
      [formData]="formData()"
      [smtpServers]="smtpServerIdentifiers()"
      [expanded]="expandEmail()"></app-email-config>
    <app-questionnaire-config
      (onAddQuestion)="addQuestion($event)"
      (onDeleteEntry)="deleteQuestion($event)"
      [formData]="formData()"
      [questionKeys]="questionKeys"
      [expanded]="expandedPanel === 'questionnaire'"></app-questionnaire-config>
    <app-yubico-config
      [formData]="formData()"
      [expanded]="expandedPanel === 'yubico'"></app-yubico-config>
    <app-yubikey-config
      (onDeleteEntry)="deleteSystemEntry($event)"
      (onYubikeyCreateNewKey)="yubikeyCreateNewKey($event)"
      [formData]="formData()"
      [yubikeyApiIds]="yubikeyApiIds"></app-yubikey-config>
    <app-daypassword-config
      [formData]="formData()"
      [hashLibs]="hashLibs()"></app-daypassword-config>
  </mat-accordion>
</div>
