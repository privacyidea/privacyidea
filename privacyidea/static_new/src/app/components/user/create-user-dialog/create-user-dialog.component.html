<app-dialog-wrapper
  (close)="close()"
  (onAction)="create()"
  [showCancelButton]="true"
  [handleCloseExternally]="true"
  [title]="title"
  [actions]="dialogActions()">

  <div class="flex-row gap-16 margin-top-16 margin-bottom-16">
    <mat-form-field
      class="input-width-l">
      <mat-label i18n>Resolver</mat-label>
      <mat-select
        [formControl]="resolverControl"
        required>
        @for (option of resolverService.editableResolvers(); track option) {
          <mat-option [value]="option">{{ option }}</mat-option>
        }
      </mat-select>
      <mat-hint>
        <span i18n>Corresponding Realms: </span>
        {{ correspondingRealms().join(", ") }}
      </mat-hint>
      @if (resolverControl.hasError('required')) {
        <mat-error i18n>Resolver is <strong>required</strong></mat-error>
      }
    </mat-form-field>

    <mat-form-field
      class="input-width-l">
      <mat-label i18n>Username</mat-label>
      <input
        [formControl]="username"
        matInput
        required>
      @if (username.hasError('required')) {
        <mat-error i18n>Username is <strong>required</strong></mat-error>
      }
    </mat-form-field>
  </div>

  <app-user-details-edit
    [resolver]="resolverControl.value"
    (updateData)="editedUserData.set($event)"></app-user-details-edit>

</app-dialog-wrapper>
