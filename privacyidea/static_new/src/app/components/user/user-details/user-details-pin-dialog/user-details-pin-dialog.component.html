<app-dialog-wrapper
  (actionTriggered)="onAction($event)"
  (wrapperClose)="close()"
  [actions]="dialogActions()"
  i18n-title="@@tokenAssignmentTitle"
  title="Token Assignment">
  <mat-form-field
    appearance="fill" class="pin-field">
    <mat-label i18n>PIN (optional)</mat-label>
    <input
      (input)="pin.set($event.target['value'])"
      [type]="hidePin() ? 'password' : 'text'"
      [value]="pin()"
      autocomplete="new-password"
      matInput />

    <button
      (click)="togglePinVisibility()" mat-icon-button matSuffix type="button">
      @if (hidePin()) {
        <mat-icon
          aria-hidden="false" aria-label="Show PIN" i18n-aria-label="@@ariaShowPin">
          visibility_off
        </mat-icon>
      } @else {
        <mat-icon
          aria-hidden="false" aria-label="Hide PIN" i18n-aria-label="@@ariaHidePin">
          visibility
        </mat-icon>
      }
    </button>
  </mat-form-field>

  <mat-form-field
    appearance="fill" class="pin-field">
    <mat-label i18n>PIN (repeat)</mat-label>
    <input
      (input)="pinRepeat.set($event.target['value'])"
      [type]="hidePin() ? 'password' : 'text'"
      [value]="pinRepeat()"
      autocomplete="new-password"
      matInput />

    <button
      (click)="togglePinVisibility()" mat-icon-button matSuffix type="button">
      @if (hidePin()) {
        <mat-icon
          aria-hidden="false" aria-label="Show PIN" i18n-aria-label="@@ariaShowPin">
          visibility_off
        </mat-icon>
      } @else {
        <mat-icon
          aria-hidden="false" aria-label="Hide PIN" i18n-aria-label="@@ariaHidePin">
          visibility
        </mat-icon>
      }
    </button>

    @if (pinRepeat() && !pinsMatch()) {
      <mat-error i18n>PINs do not match</mat-error>
    }
  </mat-form-field>
</app-dialog-wrapper>
