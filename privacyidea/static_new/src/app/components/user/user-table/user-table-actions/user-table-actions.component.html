<div class="actions-div margin-bottom-16">
  <mat-form-field
    class="input-width-l"
    subscriptSizing="dynamic">
    <mat-label>Select Realm</mat-label>
    <mat-select
      [(ngModel)]="userService.selectedUserRealm"
      [value]="userService.selectedUserRealm()">
      @for (option of realmService.realmOptions(); track option) {
        <mat-option [value]="option">{{ option }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  @if (authService.actionAllowed("adduser") && anyEditableResolver()) {
    <button
      (click)="openCreateUserDialog()"
      class="action-button-primary button-width-m"
      mat-stroked-button>
      <mat-icon>add</mat-icon>
      <span i18n>Create User</span>
    </button>
  }
</div>
