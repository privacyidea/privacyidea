<div class="flex-row gap-16">
  @for (column of [0, 1]; track column) {
    <div class="flex-column gap-16">
      @for (attribute of attributeColumns()[column]; track attribute) {
        <mat-form-field>
          <mat-label>{{ attribute }}</mat-label>
          <input
            matInput
            #inputRef
            [value]="newUserData()[attribute]"
            (input)="setNewUserData(attribute, inputRef.value)" />
        </mat-form-field>
      }
    </div>
  }
</div>
