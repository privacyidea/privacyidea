<div
  appScrollToTop
  class="service-ids-container">
  <div class="filter-paginator-container">
    <mat-form-field
      appearance="fill"
      class="table-filter"
      subscriptSizing="dynamic">
      <mat-label i18n>Filter Service IDs...</mat-label>
      <app-clearable-input
        (clearButtonClick)="resetFilter()"
        [showClearButton]="filterString().length > 0">
        <input
          #filterHTMLInputElement
          (input)="onFilterInput(filterHTMLInputElement.value)"
          [value]="filterString()"
          aria-label="Filter Input"
          i18n-aria-label
          i18n-placeholder
          matInput
          placeholder="Filter by name or description" />
      </app-clearable-input>
    </mat-form-field>
    <mat-paginator
      [length]="totalLength()"
      [pageSizeOptions]="pageSizeOptions()"
      [pageSize]="pageSizeOptions()[1]"
      showFirstLastButtons />
  </div>
  <div class="actions-container margin-bottom-16">
    <button
      (click)="onCreateNewServiceId()"
      class="action-button-primary button-width-l"
      mat-stroked-button>
      <mat-icon>add</mat-icon>
      <span i18n>Create Service ID</span>
    </button>
    <button
      (click)="deleteSelected()"
      [disabled]="selection().length === 0"
      class="action-button-delete-secondary button-width-l"
      mat-stroked-button>
      <mat-icon>delete_sweep</mat-icon>
      <span i18n>Delete</span>
    </button>


    <p
      class="margin-bottom-0 margin-top-0"
      i18n>
      Service IDs can be used to attach e.g. SSH keys to certain machines and services.
      <br />
      To view attached tokens go to
      <a [routerLink]="[ROUTE_PATHS.TOKENS_APPLICATIONS]">token applications.</a>
    </p>
  </div>

  <table
    [dataSource]="serviceIdDataSource()"
    class="service-ids-table"
    mat-table
    matSort>
    <ng-container matColumnDef="select">
      <th
        *matHeaderCellDef
        class="table-checkbox"
        mat-header-cell>
        <mat-checkbox
          (change)="$event ? toggleAllRows() : null"
          [checked]="isAllSelected()"
          [disabled]="totalLength() === 0"
          [indeterminate]="selection().length > 0 && !isAllSelected()" />
      </th>
      <td
        *matCellDef="let row"
        class="table-checkbox"
        mat-cell>
        <mat-checkbox
          (change)="$event ? toggleRow(row) : null"
          (click)="$event.stopPropagation()"
          [checked]="isSelected(row)" />
      </td>
    </ng-container>

    <ng-container matColumnDef="id">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header>
        Id
      </th>
      <td
        *matCellDef="let service"
        mat-cell>
        {{ service.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="servicename">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header>
        Name
      </th>
      <td
        *matCellDef="let service"
        mat-cell>
        <app-copyable [copyText]="service.servicename">
          <a
            role="button"
            tabindex="0"
            (click)="onEditServiceId(service)"
            (keydown.enter)="onEditServiceId(service)"
            class="flex ali-center">
            {{ service.servicename }}
          </a>
        </app-copyable>
      </td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header>
        Description
      </th>
      <td
        *matCellDef="let service"
        mat-cell>
        {{ service.description }}
      </td>
    </ng-container>

    <tr
      *matHeaderRowDef="displayedColumns"
      mat-header-row></tr>
    <tr
      *matRowDef="let row; columns: displayedColumns"
      mat-row></tr>

    <tr
      *matNoDataRow
      class="mat-row">
      <td
        class="mat-cell"
        colspan="4"
        i18n>
        No service IDs found.
      </td>
    </tr>
  </table>
</div>
