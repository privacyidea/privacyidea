<div
  appScrollToTop
  class="tokengroups-container">
  <div class="filter-paginator-container">
    <mat-form-field
      appearance="fill"
      class="table-filter"
      subscriptSizing="dynamic">
      <mat-label i18n>Filter Tokengroups...</mat-label>
      <app-clearable-input
        (onClick)="resetFilter()"
        [showClearButton]="filterString().length > 0">
        <input
          #filterHTMLInputElement
          (input)="onFilterInput(filterHTMLInputElement.value)"
          [value]="filterString()"
          aria-label="Filter Input"
          i18n-aria-label
          i18n-placeholder
          matInput
          placeholder="Filter by name or description" />
      </app-clearable-input>
    </mat-form-field>
    <mat-paginator
      [length]="totalLength()"
      [pageSizeOptions]="pageSizeOptions()"
      [pageSize]="pageSizeOptions()[1]"
      showFirstLastButtons />
  </div>
  <div class="actions-container">
    <button
      (click)="onCreateNewTokengroup()"
      class="action-button-primary button-width-l"
      i18n
      mat-stroked-button>
      <mat-icon>add</mat-icon>
      Create Token Group
    </button>
  </div>
  <table
    [dataSource]="tokengroupDataSource()"
    class="tokengroups-table"
    mat-table
    matSort>

    <ng-container matColumnDef="id">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header> Id
      </th>
      <td
        *matCellDef="let group"
        mat-cell>
        {{ group.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="groupname">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header> Name
      </th>
      <td
        *matCellDef="let group"
        mat-cell>
        <div class="flex-row flex-nowrap ali-center">
          <a
            (click)="onEditTokengroup(group)"
            class="flex ali-center">
            {{ group.groupname }}
          </a>
          <app-copy-button [copyText]="group.groupname" />
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header> Description
      </th>
      <td
        *matCellDef="let group"
        mat-cell> {{ group.description }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell> Actions
      </th>
      <td
        *matCellDef="let group"
        mat-cell>
        <div class="flex just-center">
          <button
            (click)="deleteTokengroup(group)"
            color="warn"
            i18n-matTooltip
            mat-icon-button
            matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr
      *matHeaderRowDef="displayedColumns"
      mat-header-row></tr>
    <tr
      *matRowDef="let row; columns: displayedColumns;"
      mat-row></tr>

    <tr
      *matNoDataRow
      class="mat-row">
      <td
        class="mat-cell"
        colspan="4"
        i18n>No tokengroups found.
      </td>
    </tr>
  </table>
</div>
