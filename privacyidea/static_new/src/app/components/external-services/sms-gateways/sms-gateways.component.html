<div
  appScrollToTop
  class="sms-gateways-container">
  <div class="filter-paginator-container">
    <mat-form-field
      appearance="fill"
      class="table-filter"
      subscriptSizing="dynamic">
      <mat-label i18n>Filter SMS Gateways...</mat-label>
      <app-clearable-input
        (clearButtonClick)="resetFilter()"
        [showClearButton]="filterString().length > 0">
        <input
          #filterHTMLInputElement
          (input)="onFilterInput(filterHTMLInputElement.value)"
          [value]="filterString()"
          aria-label="Filter Input"
          i18n-aria-label
          i18n-placeholder
          matInput
          placeholder="Filter by name or provider" />
      </app-clearable-input>
    </mat-form-field>
    <mat-paginator
      [length]="totalLength()"
      [pageSizeOptions]="pageSizeOptions()"
      [pageSize]="pageSizeOptions()[1]"
      showFirstLastButtons />
  </div>
  <div class="actions-container">
    <button
      (click)="onCreateNewGateway()"
      class="action-button-primary button-width-l"
      mat-stroked-button>
      <span class="icon-badge">
        <mat-icon class="padding-right-3">sms</mat-icon>
        <mat-icon class="icon-badge-overlay icon-badge-bold">add</mat-icon>
      </span>
      <span i18n>Create SMS Gateway</span>
    </button>
    <button
      (click)="deleteSelected()"
      [disabled]="selection().length === 0"
      class="action-button-delete-secondary button-width-l"
      mat-stroked-button>
      <mat-icon>delete_sweep</mat-icon>
      <span i18n>Delete</span>
    </button>
  </div>
  <table
    [dataSource]="smsDataSource()"
    class="sms-gateways-table"
    mat-table
    matSort>
    <ng-container matColumnDef="select">
      <th
        *matHeaderCellDef
        class="table-checkbox"
        mat-header-cell>
        <mat-checkbox
          (change)="$event ? toggleAllRows() : null"
          [checked]="isAllSelected()"
          [disabled]="totalLength() === 0"
          [indeterminate]="selection().length > 0 && !isAllSelected()" />
      </th>
      <td
        *matCellDef="let row"
        class="table-checkbox"
        mat-cell>
        <mat-checkbox
          (change)="$event ? toggleRow(row) : null"
          (click)="$event.stopPropagation()"
          [checked]="isSelected(row)" />
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header>
        Name
      </th>
      <td
        *matCellDef="let gateway"
        mat-cell>
        <app-copyable [copyText]="gateway.name">
          <a
            role="button"
            tabindex="0"
            (click)="onEditGateway(gateway)"
            (keydown.enter)="onEditGateway(gateway)"
            class="flex ali-center">
            {{ gateway.name }}
          </a>
        </app-copyable>
      </td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header>
        Description
      </th>
      <td
        *matCellDef="let gateway"
        mat-cell>
        {{ gateway.description }}
      </td>
    </ng-container>

    <ng-container matColumnDef="providermodule">
      <th
        *matHeaderCellDef
        i18n
        mat-header-cell
        mat-sort-header>
        Provider Module
      </th>
      <td
        *matCellDef="let gateway"
        mat-cell>
        {{ gateway.providermodule.split(".").pop() }}
      </td>
    </ng-container>

    <tr
      *matHeaderRowDef="displayedColumns"
      mat-header-row></tr>
    <tr
      *matRowDef="let row; columns: displayedColumns"
      mat-row></tr>

    <tr
      *matNoDataRow
      class="mat-row">
      <td
        class="mat-cell"
        colspan="4"
        i18n>
        No SMS gateways found.
      </td>
    </tr>
  </table>
</div>
