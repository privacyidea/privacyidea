<div class="ca-stages-list">
  @if (stages().length === 0) {
    <p class="ca-stages-list-empty" i18n>No stages defined yet. A policy needs at least one stage to take effect.</p>
  }
  @for (stage of stages(); track $index) {
    <app-conditional-access-stage-item
      [stage]="stage"
      [stageNumber]="$index + 1"
      (updateStage)="onUpdateStage($index, $event)"
      (removeStage)="onRemoveStage($index)" />
  }
  <div class="ca-add-button-row">
    <button
      mat-stroked-button
      type="button"
      class="action-button-secondary button-width-m"
      (click)="onAddStage()">
      <mat-icon>add</mat-icon>
      <span i18n>Add Stage</span>
    </button>
  </div>
</div>
