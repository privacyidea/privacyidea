<div class="ca-stage-item">
  <div class="ca-stage-header">
    <span class="ca-stage-title" i18n>Stage {{ stageNumber() }}</span>
    <button
      mat-icon-button
      aria-label="Remove stage"
      i18n-aria-label
      (click)="onRemoveStage()">
      <mat-icon>delete</mat-icon>
    </button>
  </div>
  <p class="ca-stage-hint" i18n>
    Runs the actions below once this many tracked events occur within the policy's time window.
  </p>

  <div class="ca-stage-fields">
    <mat-form-field
      appearance="fill"
      subscriptSizing="dynamic"
      class="input-width-m">
      <mat-label i18n>Failure threshold</mat-label>
      <input
        matInput
        type="number"
        min="1"
        [value]="stage().failure_threshold"
        (input)="onFailureThresholdInput($any($event.target).value)" />
      <mat-hint i18n>Number of tracked events that trigger this stage.</mat-hint>
    </mat-form-field>
  </div>

  <app-conditional-access-actions-list
    [actions]="stage().actions"
    (actionsChange)="onActionsChange($event)" />
</div>
