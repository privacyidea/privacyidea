<div class="ca-action-item">
  <mat-form-field
    appearance="fill"
    subscriptSizing="dynamic"
    class="input-width-s">
    <mat-label i18n>Action</mat-label>
    <mat-select
      [value]="action().action_type"
      (selectionChange)="onActionTypeChange($event.value)">
      @for (actionType of allActionTypes; track actionType) {
        <mat-option [value]="actionType">{{ actionType }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field
    appearance="fill"
    subscriptSizing="dynamic"
    class="input-width-xl ca-action-value">
    <mat-label i18n>Action value (JSON)</mat-label>
    <textarea
      matInput
      rows="3"
      i18n-placeholder
      placeholder="e.g. {{ '{' }}&quot;lock_duration_seconds&quot;: 600{{ '}' }}"
      [value]="actionValueText()"
      (input)="onActionValueInput($any($event.target).value)"></textarea>
    @if (jsonError()) {
      <mat-error>{{ jsonError() }}</mat-error>
    }
  </mat-form-field>

  <button
    mat-icon-button
    class="ca-remove-button"
    aria-label="Remove action"
    i18n-aria-label
    (click)="onRemoveAction()">
    <mat-icon>delete</mat-icon>
  </button>
</div>
