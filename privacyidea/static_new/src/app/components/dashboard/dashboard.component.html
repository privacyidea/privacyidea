<div class="dashboard-page">
  <div class="dashboard-toolbar">
    @if (layoutService.editMode()) {
      <button
        mat-stroked-button
        class="action-button-primary button-width-m"
        (click)="save()">
        <mat-icon>check</mat-icon>
        <span i18n>Save</span>
      </button>

      <button
        mat-stroked-button
        class="action-button-secondary button-width-m"
        (click)="cancel()">
        <mat-icon>close</mat-icon>
        <span i18n>Cancel</span>
      </button>

      <app-widget-palette />
    } @else {
      <button
        mat-stroked-button
        class="action-button-primary button-width-m"
        (click)="enterEdit()">
        <mat-icon>edit</mat-icon>
        <span i18n>Edit dashboard</span>
      </button>
    }
  </div>

  <div class="dashboard-scroll-wrapper">
    <div
      class="dashboard-field-scroll"
      #fieldScroll
      (scroll)="onFieldScroll()">
      <div
        class="dashboard-field"
        #field
        [class.editing]="layoutService.editMode()"
        [style.background-size]="anchorBackgroundSize()"
        [style.height.px]="fieldHeight()">
        @if (dragTarget(); as target) {
          <div
            class="drop-target"
            [class.invalid]="!target.valid"
            [style.left]="leftCss(target.x)"
            [style.top.px]="topPx(target.y)"
            [style.width]="widthCss(target.cols)"
            [style.height.px]="heightPx(target.rows)"></div>
        }

        @for (widget of widgets(); track widget.id) {
          <div
            class="widget-cell"
            cdkDrag
            cdkDragBoundary=".dashboard-field"
            [cdkDragDisabled]="!layoutService.editMode() || isPinned(widget)"
            [class.resizing-invalid]="isResizingInvalid(widget)"
            [style.left]="leftCss(widget.x)"
            [style.top.px]="topPx(widget.y)"
            [style.width]="widthCss(effectiveCols(widget))"
            [style.height.px]="heightPx(effectiveRows(widget))"
            (cdkDragStarted)="onDragStarted(widget, $event)"
            (cdkDragMoved)="onDragMoved(widget, $event)"
            (cdkDragEnded)="onDragEnded(widget, $event)">
            <app-widget-frame [instance]="widget" />

            @if (layoutService.editMode() && !isPinned(widget)) {
              <span
                class="resize-handle handle-e"
                aria-hidden="true"
                (pointerdown)="onResizeStart(widget, 'e', $event)"
                (pointermove)="onResizeMove($event)"
                (pointerup)="onResizeEnd()"></span>
              <span
                class="resize-handle handle-s"
                aria-hidden="true"
                (pointerdown)="onResizeStart(widget, 's', $event)"
                (pointermove)="onResizeMove($event)"
                (pointerup)="onResizeEnd()"></span>
              <span
                class="resize-handle handle-se"
                aria-hidden="true"
                (pointerdown)="onResizeStart(widget, 'se', $event)"
                (pointermove)="onResizeMove($event)"
                (pointerup)="onResizeEnd()"></span>
            }
          </div>
        }
      </div>
    </div>

    <div
      class="dashboard-bottom-fade"
      [class.dashboard-bottom-fade--hidden]="atBottom()"
      aria-hidden="true"></div>
  </div>
</div>
