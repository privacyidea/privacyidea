<div class="widget-frame">
  <div
    class="widget-header"
    cdkDragHandle
    [cdkDragHandleDisabled]="!layoutService.editMode() || pinned()"
    [class.draggable]="layoutService.editMode() && !pinned()">
    <span class="widget-title-group">
      @if (headerIcon(); as icon) {
        <ng-container *ngComponentOutlet="icon" />
      } @else if (widgetType()?.icon) {
        <mat-icon class="widget-title-icon">{{ widgetType()?.icon }}</mat-icon>
      }
      <span class="widget-title">{{ widgetType()?.title }}</span>
    </span>

    <div class="widget-actions">
      @if (showHeaderSpinner()) {
        <mat-progress-spinner
          class="widget-action widget-loading"
          mode="indeterminate"
          [diameter]="18"
          aria-label="Loading widget"
          i18n-aria-label />
      }

      @if (showReload()) {
        <button
          mat-icon-button
          class="widget-action widget-reload"
          (click)="reload()"
          aria-label="Reload widget"
          i18n-aria-label>
          <mat-icon>refresh</mat-icon>
        </button>
      }

      @if (layoutService.editMode() && !pinned()) {
        <button
          mat-icon-button
          class="widget-action widget-remove"
          (click)="remove()"
          aria-label="Remove widget"
          i18n-aria-label>
          <mat-icon>close</mat-icon>
        </button>
      }
    </div>
  </div>

  <div class="widget-body">
    @if (component(); as widgetComponent) {
      <ng-template
        [ngComponentOutlet]="widgetComponent"
        [ngComponentOutletInputs]="outletInputs()"
        #widgetOutlet="ngComponentOutlet"></ng-template>
    }
  </div>
</div>
