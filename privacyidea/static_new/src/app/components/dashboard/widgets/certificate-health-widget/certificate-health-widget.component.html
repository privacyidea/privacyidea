<app-widget-state [state]="state()">
  <div class="table-container">
    <table class="cert-health-table">
      <thead>
        <tr>
          <th i18n>Source</th>
          <th i18n>Name</th>
          <th i18n>Days left</th>
          <th i18n>Status</th>
        </tr>
      </thead>
      <tbody>
        @for (entry of entries(); track entry.source + entry.name) {
          <tr>
            <td>{{ entry.source }}</td>
            <td>{{ entry.name }}</td>
            <td>{{ entry.days_remaining !== null ? entry.days_remaining : "—" }}</td>
            <td><span [class]="badgeClass(entry.status)">{{ entry.status }}</span></td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" i18n>No certificates to monitor.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</app-widget-state>
