<app-widget-state [state]="state()">
  <div class="table-container">
    <table class="admin-table">
      <thead>
        <tr>
          <th i18n>Date</th>
          <th i18n>Administrator</th>
          <th i18n>Action</th>
          <th i18n>Detail</th>
        </tr>
      </thead>
      <tbody>
        @for (entry of entries(); track entry.number) {
          <tr>
            <td>{{ entry.date | localDateTime }}</td>
            <td>{{ entry.administrator }}</td>
            <td>{{ entry.action }}</td>
            <td>{{ entry.action_detail }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</app-widget-state>
