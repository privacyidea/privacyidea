<div class="well">
    <p class="text-muted small" translate>
        Viewing the RSS feeds for the last {{ rss_age }} days.
    </p>
    <div ng-repeat="(source, feed) in rss">
        <h3>{{ source }}</h3>
        <div class="panel panel-default" ng-repeat="item in feed">
            <div class="panel-heading">
                <strong>{{ item.title }}</strong>
                <small class="text-muted pull-right">{{ item.pub_date | date:'medium' }}</small>
            </div>
            <div class="panel-body" ng-bind-html="item.summary"></div>
        </div>
    </div>
</div>
